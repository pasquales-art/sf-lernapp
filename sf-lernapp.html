<script type="text/babel" data-presets="react">

const SESSION_KEY = "sf_session_name";
function normalizeName(n){
  return (n||"").toLowerCase().trim().replace(/\s+/g, "_").replace(/[^a-z0-9_-]/g, "").slice(0, 40);
}
function timeAgo(date){
  if (!date) return "—";
  const d = (date instanceof Date) ? date : (date.toDate ? date.toDate() : new Date(date));
  const sec = Math.floor((Date.now() - d.getTime())/1000);
  if (sec < 60)   return `${sec}s ago`;
  const min = Math.floor(sec/60);
  if (min < 60)   return `${min}m ago`;
  const hr  = Math.floor(min/60);
  if (hr  < 24)   return `${hr}h ago`;
  const day = Math.floor(hr/24);
  if (day < 30)   return `${day}d ago`;
  const mo  = Math.floor(day/30);
  return `${mo}mo ago`;
}

/* =========================================================================
   TOPICS — sourced from the six lectures + both mock exams.
   Weight reflects exam frequency / emphasis (5 = highest).

const TOPICS = [
  { id:"green-bonds",   name:"Green Bonds & the GBP",                    weight:5 },
  { id:"slb",           name:"Sustainability-Linked Bonds (SLB)",        weight:5 },
  { id:"esg-ratings",   name:"ESG Ratings & Rating Approaches",          weight:5 },

  { id:"eu-taxonomy",   name:"EU Taxonomy & Taxonomies",                 weight:4 },
  { id:"double-mat",    name:"Double Materiality & Additionality",       weight:4 },
  { id:"financing",     name:"Financing Concept & Markets",              weight:4 },
  { id:"greenium",      name:"Green Bond Premium (Greenium)",            weight:4 },
  { id:"transition",    name:"Transition Bonds & CTB",                   weight:4 },
  { id:"re-relevance",  name:"Real Estate Relevance & Green Buildings",  weight:4 },
  { id:"green-premium", name:"Green Price Premium & Hedonic Method",     weight:4 },
  { id:"gb-benefits",   name:"Green Building Benefits & Valuation",      weight:4 },
  { id:"controversies", name:"Controversial Practices & Norms",          weight:4 },
  { id:"scenario",      name:"Scenario Analysis & Risk Tools",           weight:4 },
  { id:"social-bonds",  name:"Social Bonds (SBP)",                       weight:3 },
  { id:"sustain-bonds", name:"Sustainability Bonds (SBG)",               weight:3 },
  { id:"esg-screened",  name:"ESG-Screened Bonds",                       weight:3 },
  { id:"reg-greenwash", name:"Greenwashing, OECD & Regulation",          weight:3 },
  { id:"building-std",  name:"Building Standards & GRESB",               weight:3 },
  { id:"mortgages",     name:"Swiss Mortgages, Basel III & Scope 1/2/3", weight:3 },
  { id:"risk-mgmt",     name:"Risk Management & Lender Actions",         weight:3 },
  { id:"gss-market",    name:"GSS+ Market (Size & Regions)",             weight:2 },
];

const SRC = {
  intro:   (s) => `Intro to Sustainable Financing (Berchtold), Slide ${s}`,
  debt1:   (s) => `Green Bonds & Special Purpose Debt Instruments – Part I (Mattmann), Slide ${s}`,
  debt2:   (s) => `SLB & ESG-related Debt Instruments – Part II (Mattmann), Slide ${s}`,
  helvetia:(s) => `Green Bonds @ Helvetia Baloise (Engesser), Slide ${s}`,
  re:      (s) => `Green Mortgages & Real Estate (Kraft/Kempf), Slide ${s}`,
  esgr:    (s) => `Assessment of Corporate ESG Risks (Mattmann), Slide ${s}`,
  rm:      (s) => `ESG Risk Management (Berchtold), Slide ${s}`,
  ex24:    (q) => `Past Exam 2024, Assignment ${q}`,
  ex25:    (q) => `Past Exam 2025, Assignment ${q}`,
};

/* ============================ FLASHCARDS ============================ */
const CARDS = [
  // ---- Intro: concepts ----
  { id:"c01", topic:"intro", q:"Definition of «Sustainability» (and what it is based on)", a:"«Sustainable development is development that meets the needs of the present without compromising the ability of future generations to meet their own needs.»\nThis is the definition from the Brundtland Report (1987).", src: SRC.intro(10) + " | " + SRC.ex24(1) },
  { id:"c02", topic:"intro", q:"What are the SDGs?", a:"17 UN Sustainable Development Goals, adopted end of September 2015 by the UN General Assembly (193 member states) within the «2030 Agenda for Sustainable Development». They span three areas: environment, society and economy.", src: SRC.intro(11) },
  { id:"c03", topic:"intro", q:"ESG — what do the three letters stand for, with examples?", a:"Environmental: climate change, biodiversity, water & energy efficiency, waste management.\nSocial: equal opportunities, health, workplace & product safety, human rights, child labor, supply chain.\nGovernance: business ethics, compliance, board independence, lobbying, corruption, conflicts of interest.", src: SRC.intro(12) },
  { id:"c04", topic:"intro", q:"Paris Agreement — when, objective, key mechanism?", a:"Adopted 12 Dec 2015 at COP21 in Paris. Objective: limit global warming to well below 2°C above pre-industrial levels, pursuing efforts to limit it to 1.5°C. Focus areas: mitigation, adaptation, finance. Each country sets Nationally Determined Contributions (NDCs), reviewed every 5 years.", src: SRC.intro(13) },
  { id:"c05", topic:"intro", q:"Sustainability conflict of interest — give an example", a:"Nikin wanted to become the most sustainable Swiss clothing brand — yet cut jobs to achieve it. A firm can pursue an environmental goal that conflicts with a social goal (here: employment/job security).", src: SRC.intro(14) + " | " + SRC.ex24(1) },
  { id:"c06", topic:"intro", q:"Challenges of Sustainable Financing (4 from the wrap-up)", a:"• Heterogeneous understanding of what «sustainability» is\n• Limited access to data\n• Lack of standardization of measurement and disclosure\n• Conflicts of interest", src: SRC.intro(58) },

  // ---- EU Taxonomy ----
  { id:"c07", topic:"eu-taxonomy", q:"What is the EU Taxonomy?", a:"A classification system establishing a list of environmentally sustainable economic activities. It gives companies, investors and policymakers definitions of which activities count as environmentally sustainable — creating investor security, protecting against greenwashing, and helping shift investment where it's most needed.", src: SRC.intro(15) },
  { id:"c08", topic:"eu-taxonomy", q:"From concept to regulation — the three-level logic of taxonomies", a:"Concept / Definitions → Standard / Framework → Regulation. Taxonomies move sustainability ideas from loose concepts into standards and finally into binding regulation.", src: SRC.intro(16) },
  { id:"c09", topic:"eu-taxonomy", q:"One advantage and one problem of taxonomies like the EU Taxonomy", a:"Advantage: a common, clear classification reduces greenwashing and gives investors/companies security and comparability.\nProblem: politicization & disputed inclusions (e.g. the debate over including gas and nuclear activities); complexity and reporting burden.", src: SRC.intro(15) + " | " + SRC.intro(18) + " | " + SRC.ex25(1) },

  // ---- Double materiality ----
  { id:"c10", topic:"double-mat", q:"Double Materiality — the two perspectives", a:"Financial materiality (outside-in): to what extent do environmental/climate changes pose a risk to me as a company? Target group: investors, capital providers, management.\nImpact / eco-social materiality (inside-out): to what extent do I, as a company, pose a risk to the environment/society? Target group: society, employees, environment.", src: SRC.intro(23) + " | " + SRC.esgr(9) },
  { id:"c11", topic:"double-mat", q:"Additionality — definition", a:"An activity is «additional» if the intervention is what causes the activity to take place. Additionality = (impact/change WITH intervention) − (impact/change WITHOUT intervention, the baseline).", src: SRC.intro(26) },
  { id:"c12", topic:"double-mat", q:"Greenwashing & investment goals — the three levels", a:"1. Impact with additionality: a positive contribution that changes outcomes (true impact).\n2. Alignment: aligning with goals like SDGs or net-zero, but WITHOUT additionality.\n3. ESG for financial performance: financial materiality / ESG-risk considerations only.", src: SRC.intro(32) },

  // ---- Financing concept & markets ----
  { id:"c13", topic:"financing", q:"Three ways a financing can be considered «sustainable» (basic concept)", a:"Looking at the lender→borrower flow:\n1. The COLLATERAL fulfils a sustainability standard.\n2. The ACT of lending is sustainable (e.g. financial inclusion as social impact).\n3. The BORROWER is / acts sustainably (environmental & social sustainability).", src: SRC.intro(43) + " | " + SRC.ex24(1) },
  { id:"c14", topic:"financing", q:"Primary vs. Secondary debt market", a:"Primary market: marketplace for NEW debt; purpose is capital raising by the borrower; direct purchase; one-time; fixed conditions at issue.\nSecondary market: trading of EXISTING debt; purpose is profit (±) for lenders; indirect; traded N times; fluctuating price.", src: SRC.intro(30) },
  { id:"c15", topic:"financing", q:"How does sustainability play a different role in the primary vs secondary market? (additionality lens)", a:"In the primary market the issuer raises new capital, so buying the bond can have additionality (it funds the project). In the secondary market you only buy existing debt from another investor — no new money reaches the company, so there is essentially no additionality.", src: SRC.intro(28) + " | " + SRC.intro(29) + " | " + SRC.ex25(1) },
  { id:"c16", topic:"financing", q:"Special challenges in the SME market for sustainable finance", a:"• Sustainability data from SMEs is insufficient\n• Reporting effort required from SMEs is too big\n• Data often not verified/verifiable\n• Financial incentive for SMEs too small vs. reporting effort\n• Volumes too small vs. the effort required for banks", src: SRC.intro(35) },

  // ---- Green bonds ----
  { id:"c17", topic:"green-bonds", q:"What is a green bond?", a:"Any type of (standard) bond instrument where the proceeds are exclusively applied to finance/re-finance eligible «green projects» (environmental objective) AND which is aligned with the four core components of the GBP. Often called impact / earmarked / ring-fenced / use-of-proceeds bonds. Otherwise structured identically to a conventional bond.", src: SRC.debt1(12) + " | " + SRC.debt1(15) },
  { id:"c18", topic:"green-bonds", q:"Three features green bonds and conventional bonds have in COMMON", a:"Periodic coupons; repaid at maturity; receive a credit rating; credit risk is the company's; purpose is (re-)financing. (i.e. economically identical — they are «otherwise identically structured to their non-green counterparts».)", src: SRC.debt1(13) + " | " + SRC.ex24(2) },
  { id:"c19", topic:"green-bonds", q:"Three key DIFFERENCES between green and conventional bonds", a:"Green bonds additionally have: use of proceeds restricted to green projects; separate booking/tracking of proceeds; a 'green' label; transparency on use of proceeds (documentation/reporting); and external review (second party opinion).", src: SRC.debt1(13) + " | " + SRC.ex24(2) },
  { id:"c20", topic:"green-bonds", q:"Who decides if a bond is «green»? (the core problem & solution)", a:"Problem: no mandatory regulation defines a green bond/project, so greenwashing is a risk. Solution: voluntary guidelines from recognized organizations — ICMA Green Bond Principles (GBP), the Climate Bonds Standard (CBS) from the Climate Bonds Initiative (CBI), and the EU Green Bond Standard (EuGB).", src: SRC.debt1(14) },
  { id:"c21", topic:"green-bonds", q:"The 4 core components of the ICMA Green Bond Principles", a:"1. Use of proceeds (fully finance eligible green projects with quantifiable environmental benefit)\n2. Process for project evaluation and selection\n3. Management of proceeds (separate tracking, sub-account, transparency)\n4. Reporting (annual; share allocated + impact KPIs).", src: SRC.debt1(18) },
  { id:"c22", topic:"green-bonds", q:"GBP — the 2 key recommendations (beyond the 4 core components)", a:"i. Green Bond Framework — issuer explains alignment with the four components in accessible legal documentation.\nii. External review («second party opinion») — assess alignment pre-issuance and verify fund tracking post-issuance.", src: SRC.debt1(19) },
  { id:"c23", topic:"green-bonds", q:"Examples of eligible green project categories (GBP)", a:"10 categories incl.: renewable energy; energy efficiency; pollution prevention & control; clean transportation; climate change adaptation; green buildings (recognized certifications). → Green bonds are typically only available to firms in 'green' sectors or for a-priori 'green' projects.", src: SRC.debt1(16) },
  { id:"c24", topic:"green-bonds", q:"The 5 high-level environmental objectives green projects should contribute to", a:"Climate change mitigation; climate change adaptation; natural resource conservation; biodiversity conservation; pollution prevention and control.", src: SRC.debt1(17) },
  { id:"c25", topic:"green-bonds", q:"Opportunities for issuers of special-purpose bonds", a:"Allocate funds to eco-social projects; demonstrate impact to investors; financial + eco-social value proposition; signal high ESG commitment; diversify/enlarge the investor base; possibly lower financing costs; reputation gain.", src: SRC.debt1(30) },
  { id:"c26", topic:"green-bonds", q:"Challenges for issuers of green bonds", a:"No universally accepted legal definition; even controversial issuers (oil/gas) can issue them; greenwashing doubts; uncertainty if a project is delayed/cancelled or the SPO is withdrawn; no step-up if expectations are missed; impact hard to measure; more costly/complex than conventional bonds.", src: SRC.debt1(31) },
  { id:"c27", topic:"green-bonds", q:"Blue bonds — what are they?", a:"An earmarked instrument to finance ocean-based projects benefiting the «Blue Economy» (e.g. sustainable fisheries). ICMA released voluntary guidance based on the GBP, focused on SDG 14 (Life Below Water). Blue bonds are a SUBSET of green bonds. First sovereign blue bond: Seychelles, 2018 ($15m).", src: SRC.debt1(23) },
  { id:"c28", topic:"green-bonds", q:"Helvetia Baloise green bond — eligible green assets & rationale", a:"Proceeds finance/refinance certified buildings (Minergie, LEED Gold/Platinum, SNBS, BREEAM, DGNB) and redevelopments achieving certification or ≥30% GHG reduction. Rationale: leverage existing real estate portfolio, build ESG momentum, optimize investor base/pricing, and a lower 'greenium' refinancing cost.", src: SRC.helvetia(16) + " | " + SRC.helvetia(19) },

  // ---- Greenium ----
  { id:"c29", topic:"greenium", q:"Green bond premium («greenium») — definition", a:"The yield differential at issuance between a green bond and an otherwise identical conventional bond. A negative spread (lower yield) means the issuer can borrow slightly cheaper. Example: Iberdrola priced ~5 bps below its conventional benchmark.", src: SRC.debt1(21) + " | " + SRC.ex25(2) },
  { id:"c30", topic:"greenium", q:"Two reasons a greenium might exist", a:"• Strong investor demand for green/ESG assets (oversubscription) lets issuers price tighter.\n• Diversified/enlarged investor base of sustainability-sensitive investors.\n(Issuers may also gain reputation; investors accept slightly lower yield for pro-environmental preference.)", src: SRC.debt1(21) + " | " + SRC.debt1(30) + " | " + SRC.ex24(2) },
  { id:"c31", topic:"greenium", q:"What does academic literature say about the size of the greenium?", a:"Evidence of a green bond premium of 0–19 bps globally; a recent paper finds ~12 bps on average. For the CHF market the greenium varies over time and seems to decline — since Sep 2022 it can no longer be determined with 95% certainty whether a CHF greenium exists.", src: SRC.debt1(22) },

  // ---- Social bonds ----
  { id:"c32", topic:"social-bonds", q:"Social bond — main feature", a:"Any bond instrument where proceeds are exclusively applied to «social projects» with social objectives for a certain target group, AND which is aligned with the four core components of the ICMA Social Bond Principles (SBP).", src: SRC.debt1(24) + " | " + SRC.ex25(2) },
  { id:"c33", topic:"social-bonds", q:"Eligible social project categories & target populations (SBP)", a:"Categories (6) e.g.: affordable basic infrastructure (clean water, sanitation); access to essential services (health, education, finance); affordable housing; food security.\nTarget populations: people below the poverty line; people with disabilities/undereducated; migrants, displaced persons, aging population.", src: SRC.debt1(25) },
  { id:"c34", topic:"social-bonds", q:"How do the SBP relate to the GBP?", a:"The SBP are consistent with the GBP — same 4 core components (use of proceeds; evaluation & selection; management of proceeds; reporting) plus the same 2 recommendations (framework, external review). The MAIN difference is the project objective (social vs. environmental).", src: SRC.debt1(26) },

  // ---- Sustainability bonds ----
  { id:"c35", topic:"sustain-bonds", q:"Sustainability bond — main feature", a:"A bond whose proceeds are exclusively applied to a COMBINATION of both green AND social projects, aligned with the four core components of both the GBP and the SBP (ICMA Sustainability Bond Guidelines, SBG).", src: SRC.debt1(28) },

  // ---- SLB ----
  { id:"c36", topic:"slb", q:"Sustainability-linked bond (SLB) — what is it?", a:"A bond whose FINANCIAL terms can change depending on whether the issuer meets predefined sustainability goals. It is forward-looking and performance-based: coupon payments are typically linked to Sustainability Performance Targets (SPTs). Most common consequence if a KPI is missed: a coupon STEP-UP.", src: SRC.debt2(35) },
  { id:"c37", topic:"slb", q:"SLB vs. special-purpose (green/social) bonds — key difference", a:"SLB proceeds are NOT earmarked — they fund general corporate purposes. Instead, the WHOLE company commits to future sustainability targets, with pricing linked to achievement. (Green/social bonds restrict use of proceeds; SLBs restrict nothing but tie cost to KPIs.)", src: SRC.debt2(34) + " | " + SRC.debt2(35) },
  { id:"c38", topic:"slb", q:"The 5 core components of the ICMA Sustainability-Linked Bond Principles (SLBP)", a:"1. Selection of KPIs (relevant, core, material, measurable, externally verifiable)\n2. Calibration of SPTs (ambitious, beyond business-as-usual)\n3. Bond characteristics (consequence if SPT missed — usually coupon step-up)\n4. Reporting (on KPI/SPT, e.g. annually)\n5. Verification (independent external; pre-issuance recommended, post-issuance necessary).", src: SRC.debt2(37) },
  { id:"c39", topic:"slb", q:"First SLB vs. first green bond — the timeline point", a:"SLBs are a relatively «new» instrument: Italian utility Enel issued the first SLB in 2019, whereas the first green bond was issued in 2007 by the European Investment Bank (EIB).", src: SRC.debt2(35) },
  { id:"c40", topic:"slb", q:"SLB examples: Holcim, Novartis, Enel", a:"Holcim (2020): EUR 850m / 0.5% / 2031 / +0.75% step-up.\nNovartis (2020): EUR 1.85bn / 0.00% / 2028 / +0.25% step-up.\nEnel: ~EUR 11bn SLBs; missed its 2023 Scope-1 carbon-intensity SPT (160 vs. target <148 gCO₂eq/kWh) → +0.25% step-up, ~EUR 25m extra interest.", src: SRC.debt2(38) + " | " + SRC.debt2(39) + " | " + SRC.debt2(40) },
  { id:"c41", topic:"slb", q:"SLB advantages from an ISSUER's / corporation's perspective", a:"Flexibility in use of proceeds (vs. green bonds); signal ESG commitment; start measuring ESG metrics (understand own ESG risks); diversify/enlarge investor base; potentially lower financing costs; reputation gain.", src: SRC.debt2(42) + " | " + SRC.ex25(3) },
  { id:"c42", topic:"slb", q:"SLB challenges / criticism", a:"No restriction on use of proceeds; ambition of self-set target and penalty may be weak; low incentives; issuer not obliged to keep meeting the target on a rolling basis; no legally-binding standards; greenwashing/credibility concerns; uncertainty on target failure and measurement.", src: SRC.debt2(42) },

  // ---- Transition bonds ----
  { id:"c43", topic:"transition", q:"Transition bonds — what are they and who issues them?", a:"Use-of-proceeds bonds whose proceeds fund decarbonizing operations/projects. Intention: 'brown' today, with a clear ambition/strategy to be 'greener'. Used by hard-to-abate sectors (cement, oil & gas, steel) that have a reduction strategy (net-zero / 1.5°C). Focus is short-/medium-term transition finance.", src: SRC.debt2(45) },
  { id:"c44", topic:"transition", q:"Green-labelled vs. transition-labelled bonds", a:"Green-labelled: proceeds finance ALREADY-GREEN activities in low-emitting sectors (e.g. renewables, green buildings).\nTransition-labelled: proceeds finance the TRANSITION of 'brown' / high-emitting industries that must substantially contribute to halving global emissions by 2030 and net-zero by 2050.", src: SRC.debt2(47) + " | " + SRC.ex24(3) },
  { id:"c45", topic:"transition", q:"Transition bond use-of-proceeds examples by industry", a:"Energy: coal-to-gas switch, co-generation (CHP). Transport: gas-powered ships (vs. marine diesel), sustainable aviation fuel (SAF). Industry: cement/metals/glass efficiency — reduce clinker ratio, recycled raw materials, higher recycling.", src: SRC.debt2(46) },
  { id:"c46", topic:"transition", q:"ICMA Climate Transition Bond (CTB) Guidelines — basics", a:"Published Nov 2025. CTBs are use-of-proceeds bonds that follow the GBP's four core components (with adaptations for Climate Transition projects) plus the two recommendations (framework + external review). Core component 1 requires alignment with sector pathways/roadmaps and substantial, quantifiable GHG mitigation beyond business-as-usual.", src: SRC.debt2(48) + " | " + SRC.debt2(49) },

  // ---- ESG-screened ----
  { id:"c47", topic:"esg-screened", q:"ESG-screened bonds — what are they (and not)?", a:"NOT a debt instrument but a PROCESS to (de-)select = screen issuers of fixed-income securities on ESG criteria. Financial and non-financial criteria are applied at portfolio/index level; the bond universe is filtered by issuer ESG ratings.", src: SRC.debt2(57) },
  { id:"c48", topic:"esg-screened", q:"The ESG-screening process (3 steps)", a:"1. Screen instrument/issuer on FINANCIAL criteria (coupon, maturity, rating, issue size, balance sheet).\n2. Screen issuer on NON-FINANCIAL criteria (ESG ratings, international norms e.g. UN Global Compact, controversial products e.g. weapons/tobacco).\n3. Apply traditional ESG strategies (exclusions, positive selection, best-in-class).", src: SRC.debt2(57) },
  { id:"c49", topic:"esg-screened", q:"Values-based vs. norms-based exclusions (iShares example)", a:"Values-based: exclude controversial weapons, firearms retail, thermal coal, tobacco. Norms-based: exclude issuers failing the UN Global Compact Principles or involved in serious controversies.", src: SRC.debt2(58) },

  // ---- GSS+ market ----
  { id:"c50", topic:"gss-market", q:"GSS / GSS+ / thematic bonds — naming conventions", a:"GSS = Green, Social, and Sustainability bonds. GSS+ = GSS plus other bonds (sustainability-linked + transition). Thematic bonds (per World Bank) = green, social, sustainability AND sustainability-linked bonds.", src: SRC.debt2(9) },
  { id:"c51", topic:"gss-market", q:"GSS+ market — size and composition", a:"~$1 trillion in annual issuance (≈10–15% of the global bond market). Special-purpose (GSS) bonds make up ~95% of GSS+. Green bonds are the majority (~62%, ~$620bn). Social (~$150bn) and sustainability bonds (~$175bn) are still niche; SLB (~$35bn) and transition (~$20bn) are negligible by volume.", src: SRC.debt2(53) },
  { id:"c52", topic:"gss-market", q:"GSS+ market by region", a:"Europe has led GSS+ issuance every year since 2017, by far (~47%). APAC is second (~24%). North America (~12%) is more reluctant; Middle East & Africa (~2%) is the smallest share.", src: SRC.debt2(54) },

  // ---- Real estate relevance ----
  { id:"c53", topic:"re-relevance", q:"Impact of real estate + buildings worldwide (3 key figures)", a:"~1/3 of final energy consumption; ~40% of CO₂ emissions; ~50% of total natural resource consumption. The global building footprint grew ~23% from 2010–2018 (2.5%/yr → doubling in ~28 years).", src: SRC.re(30) + " | " + SRC.ex24(4) },
  { id:"c54", topic:"re-relevance", q:"What is a «green building»? (World Green Building Council)", a:"A building that, in its design, construction or operation, reduces/eliminates negative impacts and can create positive impacts on climate and nature. Features: efficient energy/water/resource use; renewable energy; pollution & waste reduction; good indoor air quality; non-toxic/sustainable materials; consideration of environment and occupant quality of life; adaptability.", src: SRC.re(26) },
  { id:"c55", topic:"re-relevance", q:"Embodied energy / embodied carbon — definition", a:"The GHG emissions (CO₂e) associated with materials and construction processes across the WHOLE lifecycle of a building (production, transport, disposal) — «graue Energie». As operational emissions become manageable, embodied energy becomes the increasingly important and still largely unresolved challenge.", src: SRC.re(33) },
  { id:"c56", topic:"re-relevance", q:"History of the sustainability concept (the >300-year point)", a:"The concept is over 300 years old — it originates in the overexploitation of forests (forestry: cut no more wood than can regrow). It did NOT begin with Chernobyl. Modern milestones: Brundtland Report (1987), Rio Conference (1992), BREEAM (1990/92), LEED & Minergie (1998), SNBS (2013).", src: SRC.re(27) + " | " + SRC.re(40) + " | " + SRC.ex24(4) },
  { id:"c57", topic:"re-relevance", q:"Three-pillar model (triple bottom line) of sustainability", a:"Economy, society and environment are connected and interdependent. The two extra «pillars» are equity (justice between North/South, today/tomorrow) and equality of the three dimensions. Reflected in the Swiss Federal Constitution.", src: SRC.re(28) + " | " + SRC.re(29) },

  // ---- Building standards ----
  { id:"c58", topic:"building-std", q:"Standard/guideline vs. label/certification", a:"Standard/guideline: open, self-declared by the project team, freely interpretable, flexible (e.g. SIA 2040, SNBS as guideline). Label/certification: verification documents + EXTERNAL review by a certification body, rigid but recognized & comparable (e.g. Minergie, GEAK, LEED).", src: SRC.re(33) },
  { id:"c59", topic:"building-std", q:"MINERGIE — what is it?", a:"A Swiss building standard for new & modernized buildings (>25 years). Focus: comfort, efficiency, value retention. Variants: Minergie (quality/comfort/efficiency), Minergie-P (near-zero-energy, high-quality envelope), Minergie-A (plus-energy). ~2.43% of Swiss residential properties are certified.", src: SRC.re(42) },
  { id:"c60", topic:"building-std", q:"GEAK — what is it?", a:"GEAK = the cantonal building energy certificate (Gebäudeenergieausweis der Kantone). It assesses three characteristics — efficiency of the building envelope, total energy efficiency, and direct CO₂ emissions — and assigns 7 energy classes (A–G).", src: SRC.re(43) },
  { id:"c61", topic:"building-std", q:"SNBS — and why is it the most comprehensive Swiss standard?", a:"Standard Nachhaltiges Bauen Schweiz: the first comprehensive, certifiable Swiss standard (developed 2011–12 for the SFOE). Unlike GEAK/Minergie (energy-focused), SNBS covers all 3 pillars — society, economy, environment (12 topics, 23 criteria, 45 indicators, 139 metrics).", src: SRC.re(44) + " | " + SRC.ex24(4) },
  { id:"c62", topic:"building-std", q:"GRESB — what is it and how does it differ from LEED/BREEAM?", a:"Global Real Estate Sustainability Benchmark (founded 2009): an independent rating measuring the sustainability performance of real estate COMPANIES and FUNDS at PORTFOLIO level. LEED/BREEAM focus on individual properties; GRESB aggregates across the portfolio. Categories: Management (30 pts), Performance (70), Development (70). Top performers = «Green Star».", src: SRC.re(50) + " | " + SRC.re(51) + " | " + SRC.re(54) },

  // ---- Green price premium ----
  { id:"c63", topic:"green-premium", q:"Do green buildings achieve higher prices/rents? (meta-analysis)", a:"Yes. Fuerst & Dalton (2019), 42 international studies: average rental premium ~6.02% and sales premium ~7.61%. In Switzerland, Salvi et al. (2008): ~7% premium for Minergie single-family homes and ~3.5% for condominiums.", src: SRC.re(55) + " | " + SRC.re(61) },
  { id:"c64", topic:"green-premium", q:"The hedonic method — what is it?", a:"A statistical instrument to make heterogeneous goods comparable. Every property is a bundle of attributes (size, location, age, quality…). Multiple regression derives the implicit price of each attribute — so you can isolate the value of «green» while holding everything else constant (ceteris paribus).", src: SRC.re(56) + " | " + SRC.re(57) },
  { id:"c65", topic:"green-premium", q:"Estimating «green» in a hedonic regression", a:"«Green» can enter as a dummy variable (1/0, using a label like MINERGIE as a proxy) or as a linear variable (a measure of greenness, e.g. kWh/m²). The estimated coefficient is the green premium — note it need not exceed the extra construction cost of building green.", src: SRC.re(59) },
  { id:"c66", topic:"green-premium", q:"Reading a log-linear hedonic coefficient (the exam trick)", a:"In ln(Price) = β0 + β1·MINERGIE + …, the coefficient β1 on the green dummy is ≈ the percentage price mark-up. So β1 = 0.03 → ~3% mark-up; β1 = 0.045 → ~4.5% mark-up for a certified building.", src: SRC.re(59) + " | " + SRC.ex24(4) + " | " + SRC.ex25(4) },
  { id:"c67", topic:"green-premium", q:"Decomposing the green premium (Kempf & Syz 2022, Zurich)", a:"Total green premia: 2.45% (canton) / 4.91% (city). Of this: ~6% (city: insignificant) from energy savings; ~71% (city: 70%) from increased COMFORT/quality of living; ~23% (city: 33%) from building VALUE retention. → ~2/3 comfort, ~1/3 value retention, small bit for energy savings.", src: SRC.re(73) },

  // ---- Green building benefits ----
  { id:"c68", topic:"gb-benefits", q:"Why does the market pay a premium for green buildings (beyond energy savings)?", a:"Energy savings alone don't explain it. The premium also reflects: reduced water/waste/emissions & O&M cost; the value of a better building envelope (slower depreciation, lower future renovation cost); and utility to tenants — comfort, lower sick rates, higher productivity.", src: SRC.re(62) + " | " + SRC.re(63) },
  { id:"c69", topic:"gb-benefits", q:"Kats (2003) «green bill» — the two key findings", a:"• Productivity benefits are estimated at ~10× the energy savings.\n• Total financial benefits of green buildings are ~10× the initial design & construction costs. (20-yr NPV ≈ +489 USD/sqm after subtracting the green cost premium.)", src: SRC.re(75) + " | " + SRC.ex25(4) },
  { id:"c70", topic:"gb-benefits", q:"Additional construction cost of building green (RICS/CBRE)", a:"Basic certification: +2–3%. Higher certification: +5–7.5%. Zero-carbon status: up to +12.5%. (Excludes land value, unlike the green premium on market prices.) Usually much less than the market price premium.", src: SRC.re(70) },
  { id:"c71", topic:"gb-benefits", q:"Property valuation & the cap-rate channels (Kempf & Syz)", a:"Value V = discounted future net operating income (rents R minus costs C). Green buildings raise V through three channels:\n1. Decreased operating costs Ct ↓ → V ↑\n2. Increased net rents Rt ↑ → V ↑\n3. Lower risk premium RP ↓ → gross cap rate i ↓ → V ↑", src: SRC.re(71) + " | " + SRC.re(72) },
  { id:"c72", topic:"gb-benefits", q:"Evidence summary: construction cost, operating cost, vacancy, risk premium", a:"Construction cost: NO clear effect (mixed, −0.4% to +21%). Operating cost: mixed/NOT clear. Vacancy risk: YES — sustainable buildings have lower vacancy risk (consensus). Risk premium: YES — lower; e.g. Kempf & Syz find ~0.56% lower cap rates for Minergie, others up to 65 bps.", src: SRC.re(77) + " | " + SRC.re(78) + " | " + SRC.re(79) + " | " + SRC.re(80) },

  // ---- Mortgages, Basel III, Scope ----
  { id:"c73", topic:"mortgages", q:"Scope 1, 2 and 3 emissions (for a bank)", a:"Scope 1: direct emissions the bank causes itself (e.g. electricity GENERATION in its own branches / company vehicles). Scope 2: indirect from purchased energy (e.g. district heating/cooling, purchased electricity). Scope 3: all other value-chain emissions — for a bank the big one is FINANCED emissions (financing & investments) and e.g. employee commuting.", src: SRC.re(17) + " | " + SRC.ex25(4) },
  { id:"c74", topic:"mortgages", q:"Why are mortgages central to «financed emissions» in Switzerland?", a:"Swiss mortgage volume is ~170% of GDP — a huge stock. A large fraction of new mortgages funds construction and refurbishment, so banks' financed emissions (Scope 3) and their leverage over building sustainability run mainly through mortgages. Biggest impact: financing heating replacements in cities.", src: SRC.re(6) + " | " + SRC.re(14) + " | " + SRC.re(15) },
  { id:"c75", topic:"mortgages", q:"Basel III (Swiss, from 1 Jan 2025) — effect on green/real-estate lending", a:"Banks must hold significantly more equity when the loan-to-value (LTV) exceeds 60%, raising their cost and the mortgage rate charged. Combined with the UBS–CS merger reducing credit supply, this contributes to a credit crunch: fewer developments, less housing supply, rising rents.", src: SRC.re(20) },
  { id:"c76", topic:"mortgages", q:"Impact-oriented vs. merely sustainable real-estate investment", a:"Per Staub-Bisang et al. (2022) impact investing needs: (1) explicit intent to achieve positive eco-social impact, (2) a positive return, and (3) measurable real-economy impact. Buying a green new build = sustainable but NOT impact (impact happened before you). Refurbishing a 'brown' building to be efficient = real, measurable impact.", src: SRC.re(9) + " | " + SRC.re(10) },

  // ---- ESG ratings ----
  { id:"c77", topic:"esg-ratings", q:"Financial-risk-oriented vs. ethical-ecological ESG rating approaches", a:"Financial-risk-oriented: measures financially MATERIAL ESG risks — the risk ESG issues pose to financial performance (financial materiality). Ethical-ecological: measures the company's environmental & social IMPACT (eco-social materiality). MOST ESG ratings follow the financial-risk-oriented approach.", src: SRC.esgr(14) + " | " + SRC.ex24(5) },
  { id:"c78", topic:"esg-ratings", q:"What do MSCI, Sustainalytics and Inrate each measure?", a:"MSCI: a company's resilience to financially material ESG risks (financial materiality). Sustainalytics: exposure to industry-specific material ESG risks and how well they are managed (risk). Inrate: the positive AND negative IMPACT of a company on environment & society (eco-social impact).", src: SRC.esgr(16) },
  { id:"c79", topic:"esg-ratings", q:"«Financially material ESG risks» — what do agencies mean?", a:"Those ESG risks that can have a material impact on the financial success/enterprise value of a company. Selected via tools like MSCI's ESG Industry Materiality Map (3 pillars → 10 themes → 33 key issues), weighted by industry.", src: SRC.esgr(18) + " | " + SRC.ex24(5) },
  { id:"c80", topic:"esg-ratings", q:"The ESG rating model framework (5 steps)", a:"1. Select ESG criteria. 2. Weight them (by industry). 3. Measure/assess via ESG indicators. 4. Aggregate into E, S and G sub-ratings. 5. Normalize relative to industry peers → final rating AAA (best) to CCC (worst). Crucial: ratings are RELATIVE to industry peers, not absolute.", src: SRC.esgr(20) + " | " + SRC.esgr(22) },
  { id:"c81", topic:"esg-ratings", q:"Why do ESG ratings differ across agencies?", a:"They use different definitions/objectives (financial vs. impact materiality), select different criteria, weight them differently, use different data and proprietary models, and an ESG rating is ultimately the subjective opinion of the agency — not based on a single accepted standard.", src: SRC.esgr(23) + " | " + SRC.ex25(5) },
  { id:"c82", topic:"esg-ratings", q:"What type of investor uses financial-risk-oriented ESG ratings, and why?", a:"Mainstream/financially-motivated investors and capital providers who care about risk-adjusted returns — they use these ratings to assess the financially material ESG risks that could affect a company's enterprise value / financial performance, not its eco-social impact.", src: SRC.esgr(14) + " | " + SRC.ex25(5) },

  // ---- Controversies ----
  { id:"c83", topic:"controversies", q:"Controversial products vs. controversial business practices", a:"Controversial products: products deemed controversial due to impact on consumers/society or ethical concerns (e.g. tobacco, weapons). Controversial business practices: HOW a company conducts business — practices seen as unethical or illegal (fraud, bribery, discrimination, harmful production; or legal-but-contested like animal testing).", src: SRC.esgr(25) + " | " + SRC.ex24(5) },
  { id:"c84", topic:"controversies", q:"Relevant laws/regulations and international norms for business practices", a:"Laws/regulations: new Swiss supply-chain due-diligence law (Responsible Business Initiative); EU Corporate Sustainability Due Diligence law. International norms: UN Global Compact (UNGC); OECD Guidelines for Multinational Enterprises; ILO international labour standards.", src: SRC.esgr(25) },
  { id:"c85", topic:"controversies", q:"How can violating norms/standards become FINANCIALLY relevant?", a:"Operational risk (accidents from non-compliance, e.g. Deepwater Horizon); reputational risk (consumers avoid products, e.g. VW; harder recruiting); legal/regulatory risk (heavy fines e.g. Holcim, loss of licence to operate e.g. Glencore). → substantial loss of reputation, fines, lost licence, operational risk.", src: SRC.esgr(30) + " | " + SRC.ex24(5) },
  { id:"c86", topic:"controversies", q:"Why might controversial practices NOT always be financially material? (2 reasons)", a:"Evidence is mixed: for some markets/firms a controversy has little or even no negative stock effect (e.g. weak/positive effects found for German & Swiss discrimination cases). Reasons: markets may already price it in or see it as immaterial to value; effects vary by jurisdiction, sector and whether consumers/regulators actually react.", src: SRC.esgr(29) + " | " + SRC.ex25(5) },
  { id:"c87", topic:"controversies", q:"Main challenge in evaluating alignment with the UN Global Compact?", a:"Assessment relies on disclosure and judgement: norms are broad/qualitative, data is often self-reported and unverified, and agencies differ on what counts as a 'violation' — so it is hard to objectively and comparably determine whether a company actually complies.", src: SRC.esgr(16) + " | " + SRC.esgr(25) + " | " + SRC.ex25(5) },

  // ---- Climate risk ----
  { id:"c88", topic:"climate-risk", q:"Physical vs. transition climate risk", a:"Physical risk: damage/disruption from the physical effects of climate change (e.g. floods, rising temperatures, less snow, polluted/scarce water). Transition risk: risks from the move to a low-carbon economy — policy, regulation, technology, market & demand shifts (e.g. CO₂ tax, EV subsidies, changing demand for sustainable products).", src: SRC.rm(17) + " | " + SRC.ex24(6) + " | " + SRC.ex25(6) },
  { id:"c89", topic:"climate-risk", q:"FINMA's view: is climate risk a new risk category?", a:"No. Per FINMA, climate-related financial risks can be classified within the classic risk categories (credit, market, insurance, operational) — so climate change is a new RISK DRIVER, not a new risk category.", src: SRC.rm(14) },
  { id:"c90", topic:"climate-risk", q:"Classify these as transition or physical: CO₂-tax rise, less winter snow, EV subsidies, polluted water, demand for sustainable products, rising temperatures", a:"Transition: increased CO₂ tax; increased EV subsidies; increased demand for sustainable products. Physical: less snow in winter; polluted drinking water; rising temperatures.", src: SRC.rm(17) + " | " + SRC.ex24(6) },
  { id:"c91", topic:"climate-risk", q:"How can «increased demand for sustainable products» materialise as a risk?", a:"It is a transition risk: if the company fails to offer such products to meet the shift in demand (a risk-management gap), its revenue is hit — affecting the income statement / financial results.", src: SRC.ex24(6) },
  { id:"c92", topic:"climate-risk", q:"IPCC definition of «risk»", a:"The potential for adverse consequences for human or ecological systems. In a climate context, risk arises both from the impacts of climate change AND from human responses to it — affecting lives, livelihoods, health, economic/social/cultural assets, infrastructure, services, ecosystems and species.", src: SRC.rm(18) },

  // ---- Scenario analysis ----
  { id:"c93", topic:"scenario", q:"Common risk-assessment tools used for sustainability/climate risk", a:"Scenario analysis (alternative futures); stress tests (resilience to extreme shocks, e.g. GDP −8% & energy +100%); simulation analysis (e.g. Monte Carlo — probabilistic uncertainty); sensitivity analysis (small parameter changes); risk matrix (probability vs. impact).", src: SRC.rm(32) + " | " + SRC.ex24(6) },
  { id:"c94", topic:"scenario", q:"Exploratory vs. normative scenarios", a:"Exploratory: «What could happen?» — start from the present and project plausible futures/outcomes. Normative: «How can a desired future be achieved?» — start from a target outcome and work backwards to the pathway. (Example normative: a net-zero-by-2050 target, deriving the actions/policies needed.)", src: SRC.rm(35) + " | " + SRC.ex25(6) },
  { id:"c95", topic:"scenario", q:"Key considerations when selecting a scenario for analysis", a:"Define operational boundary (physical & transition); choose relevant risks; scope/areas of focus; time horizon; number of scenarios; and the SOURCE of the scenarios (e.g. IPCC, IEA, NGFS). Then run the risk assessment, refine, and integrate into reporting/disclosure.", src: SRC.rm(33) + " | " + SRC.ex25(6) },
  { id:"c96", topic:"scenario", q:"Scenario sources & frameworks: IEA, IPCC (RCP/SSP), NGFS", a:"IEA: scenarios by different POLICY outcomes. IPCC: by atmospheric GHG concentration — RCPs (Representative Concentration Pathways), replaced by SSPs (Shared Socioeconomic Pathways) in the 6th assessment. NGFS: Network for Greening the Financial System scenarios for the financial sector.", src: SRC.rm(35) + " | " + SRC.rm(39) + " | " + SRC.rm(41) },
  { id:"c97", topic:"scenario", q:"Challenges of climate scenario analysis", a:"Lack of guidance/best practice; need a wider range of complementary scenarios; communicating the inherent uncertainty of climate scenarios; and limited customization/flexibility — off-the-shelf scenarios often don't fit a firm's specifics and are hard to adapt.", src: SRC.rm(42) },

  // ---- Risk management & lenders ----
  { id:"c98", topic:"risk-mgmt", q:"Fields of action for lenders regarding sustainable financing", a:"Risk side: exclusion (don't finance certain firms/sectors); pricing-in sustainability risks (risk-adjusted pricing via ESG ratings/KPIs). Opportunity side: financing sustainability solutions; financing the sustainability transformation; promoting local small companies/start-ups. Plus support without direct financing (e.g. consulting).", src: SRC.rm(8) },
  { id:"c99", topic:"risk-mgmt", q:"Key take-aways from the IFZ climate-risk study (Hunziker et al. 2022)", a:"Climate change is NOT just an emerging risk — it costs already today (2/3 of firms hit by higher raw-material costs; 1/2 by higher production costs; delivery delays common). There is disagreement on relevance (boards/risk mgmt rate it high, management lower). And there's a lack of data and expertise — >1/3 don't assess climate risk at all.", src: SRC.rm(28) + " | " + SRC.rm(29) + " | " + SRC.rm(30) },
  { id:"c100", topic:"risk-mgmt", q:"What might a lender ask for before lending to a climate-exposed firm (e.g. AlpsTech)?", a:"Evidence of climate-risk management: a risk assessment / scenario analysis of physical & transition exposure; sustainability KPIs/targets and reporting; mitigation & adaptation plans; financed-emissions data; and how climate risk is governed. This informs risk-adjusted pricing, exclusion or support.", src: SRC.rm(43) + " | " + SRC.rm(8) },
];

/* ============================ QUIZ ============================ */
const QUIZ = [
  // ----- From the 2024 & 2025 mock exams (open) -----
  { id:"e01", topic:"intro", type:"open", q:"Exam 2024 · A1: Define «Sustainability» and state what this definition is based on. (2 pts)", sample:"«Development that meets the needs of the present without compromising the ability of future generations to meet their own needs.» — based on the Brundtland Report (1987).", src: SRC.ex24(1) },
  { id:"e02", topic:"financing", type:"open", q:"Exam 2024 · A1: Name three ways a financing can be considered sustainable (basic financing concept). (6 pts)", sample:"1. The collateral fulfils a sustainability standard.\n2. The act of lending itself is sustainable (e.g. financial inclusion as social impact).\n3. The borrower is / acts sustainably (environmental & social sustainability).", src: SRC.ex24(1) },
  { id:"e03", topic:"green-bonds", type:"open", q:"Exam 2024 · A2: Describe three features green bonds and conventional bonds have in common. (3 pts)", sample:"Periodic coupons; repaid at maturity; receive a credit rating (credit risk = the company's); purpose is (re-)financing. They are otherwise identically structured to non-green bonds.", src: SRC.ex24(2) },
  { id:"e04", topic:"green-bonds", type:"open", q:"Exam 2024 · A2: Describe three key differences between green and conventional bonds. (3 pts)", sample:"Use of proceeds restricted to green projects; separate booking/tracking of proceeds; 'green' label; transparency/reporting on use of proceeds; external review (second party opinion).", src: SRC.ex24(2) },
  { id:"e05", topic:"sustain-bonds", type:"open", q:"Exam 2024 · A2: Describe in brief the main feature of a sustainability bond. (2 pts)", sample:"Proceeds are exclusively applied to a combination of BOTH green AND social projects, aligned with the four core components of both the GBP and SBP.", src: SRC.ex24(2) },
  { id:"e06", topic:"slb", type:"open", q:"Exam 2024 · A3: Describe three advantages of SLBs from an INVESTOR's perspective. (3 pts)", sample:"Exposure to issuers committing to ESG improvement with a financial consequence (coupon step-up) if missed; access to issuers/sectors not eligible for green bonds; portfolio ESG-signaling/diversification; transparency via reported KPIs/SPTs and external verification.", src: SRC.ex24(3) },
  { id:"e07", topic:"transition", type:"open", q:"Exam 2024 · A3: Describe the difference between «transition-labelled» and «green-labelled» bonds. (3 pts)", sample:"Green-labelled: finance already-green activities in low-emitting sectors (renewables, green buildings). Transition-labelled: finance the transition of 'brown'/high-emitting industries that must substantially cut emissions toward 2030/net-zero 2050.", src: SRC.ex24(3) },
  { id:"e08", topic:"eu-taxonomy", type:"open", q:"Exam 2025 · A1: Name and explain one major advantage and one major problem of taxonomies such as the EU Taxonomy. (4 pts)", sample:"Advantage: a common classification creates clarity/comparability and protects against greenwashing. Problem: politicization & disputed inclusions (e.g. gas & nuclear) plus complexity/reporting burden undermine credibility.", src: SRC.ex25(1) },
  { id:"e09", topic:"financing", type:"open", q:"Exam 2025 · A1: Describe (≤2 sentences) how sustainability might play a different role in the primary vs. the secondary market. (3 pts)", sample:"In the primary market new capital reaches the issuer, so the investment can have additionality (it funds the project). In the secondary market only existing debt changes hands between investors — no new money reaches the company, so there is essentially no additionality.", src: SRC.ex25(1) },
  { id:"e10", topic:"greenium", type:"open", q:"Exam 2025 · A2: (i) How is a green bond premium defined and (ii) give two reasons for its existence. (3 pts)", sample:"(i) The yield differential at issuance between a green bond and an otherwise identical conventional bond (a lower/negative yield = greenium). (ii) Strong investor demand/oversubscription lets issuers price tighter; a broader sustainability-sensitive investor base; reputation/pro-environmental preference.", src: SRC.ex25(2) },
  { id:"e11", topic:"slb", type:"open", q:"Exam 2025 · A3: Describe three advantages of SLBs from a CORPORATION's perspective. (3 pts)", sample:"Flexible use of proceeds (vs. green bonds); signal ESG commitment; begin measuring ESG metrics/understand own ESG risks; diversify/enlarge the investor base; potentially lower financing costs; reputation gain.", src: SRC.ex25(3) },
  { id:"e12", topic:"esg-ratings", type:"open", q:"Exam 2025 · A5: What type of investors typically uses financial-risk-oriented ESG ratings, and why? (2 pts)", sample:"Mainstream/financially-motivated investors and capital providers — to assess the financially material ESG risks that could affect a company's enterprise value and risk-adjusted returns (financial materiality), rather than its eco-social impact.", src: SRC.ex25(5) },
  { id:"e13", topic:"controversies", type:"open", q:"Exam 2025 · A5: Why might controversial business practices NOT always have a material financial impact? Name two reasons. (2 pts)", sample:"Markets may already price the issue in, or judge it immaterial to value; and the effect varies by jurisdiction/sector and on whether consumers, regulators or investors actually react (evidence is mixed — e.g. weak/positive effects for some German & Swiss cases).", src: SRC.ex25(5) },
  { id:"e14", topic:"scenario", type:"open", q:"Exam 2025 · A6: Describe (i) an example of a normative scenario and (ii) what you derive from a normative scenario analysis. (2 pts)", sample:"(i) A target-driven scenario such as 'reach net-zero by 2050' (or limit warming to 1.5°C). (ii) You work backwards from the desired future to derive the pathway, policies and actions needed to achieve it.", src: SRC.ex25(6) },
  { id:"e15", topic:"climate-risk", type:"open", q:"Exam 2025 · A6: Explain the difference between transition and physical risks. (2 pts)", sample:"Physical risk = harm from the physical effects of climate change (floods, heat, drought). Transition risk = risk from the shift to a low-carbon economy — policy, regulation, technology, market and demand changes (e.g. CO₂ tax, EV subsidies).", src: SRC.ex25(6) },

  // ----- True / False (from exams) -----
  { id:"e16", topic:"slb", type:"mcq", q:"True or false: There are globally binding regulations for issuers of SLBs.", options:["True","False"], correct:1, src: SRC.ex24(3), explain:"False — there are NO globally binding regulations; the ICMA SLB Principles are voluntary." },
  { id:"e17", topic:"slb", type:"mcq", q:"True or false: Unlike for green bonds, the ICMA SLB Principles do NOT require issuers to carry out an independent external review.", options:["True","False"], correct:1, src: SRC.ex24(3) + " | " + SRC.debt2(37), explain:"False — the SLBP do require verification: external verification of the SPTs is necessary post-issuance (pre-issuance recommended)." },
  { id:"e18", topic:"transition", type:"mcq", q:"True or false: Transition bonds are typically issued by companies in «brown» industries.", options:["True","False"], correct:0, src: SRC.ex24(3) + " | " + SRC.debt2(45), explain:"True — they target hard-to-abate 'brown' sectors (cement, oil & gas, steel) with a credible decarbonization strategy." },
  { id:"e19", topic:"esg-screened", type:"mcq", q:"True or false: ESG-screened bonds are special securities where issuers are screened on «green or social projects».", options:["True","False"], correct:1, src: SRC.ex24(3) + " | " + SRC.debt2(57), explain:"False — ESG screening is a PROCESS that screens ISSUERS on ESG criteria; it is not a use-of-proceeds (project) instrument." },
  { id:"e20", topic:"greenium", type:"mcq", q:"True or false: One reason corporations (e.g. Baloise) issue green bonds is the potential benefit of a green bond premium.", options:["True","False"], correct:0, src: SRC.ex25(2) + " | " + SRC.helvetia(16), explain:"True — a greenium (lower refinancing cost) is an explicit part of Baloise's green bond rationale." },
  { id:"e21", topic:"green-bonds", type:"mcq", q:"True or false: ICMA is a self-regulatory organization that releases BINDING guidelines for green bond issuers.", options:["True","False"], correct:1, src: SRC.ex25(2) + " | " + SRC.debt1(15), explain:"False — the ICMA Green Bond Principles are VOLUNTARY guidelines, not binding." },
  { id:"e22", topic:"green-bonds", type:"mcq", q:"True or false: The ICMA GBP consist of four core components plus two BINDING recommendations.", options:["True","False"], correct:1, src: SRC.ex25(2) + " | " + SRC.debt1(19), explain:"False — there are four core components and two recommendations, but the recommendations are NOT binding (the whole framework is voluntary)." },
  { id:"e23", topic:"green-bonds", type:"mcq", q:"True or false: Special-purpose debt instruments can support the transition to «net-zero» as outlined in the Paris Agreement.", options:["True","False"], correct:0, src: SRC.ex25(2) + " | " + SRC.debt1(6), explain:"True — financing the net-zero transition is a core rationale for sustainable debt instruments." },
  { id:"e24", topic:"transition", type:"mcq", q:"True or false: Transition bonds are often used in hard-to-abate sectors.", options:["True","False"], correct:0, src: SRC.ex25(3) + " | " + SRC.debt2(45), explain:"True — cement, steel, oil & gas, aviation, shipping etc." },
  { id:"e25", topic:"gss-market", type:"mcq", q:"True or false: Social bonds and sustainability bonds are still niche products compared to the overall fixed-income market.", options:["True","False"], correct:0, src: SRC.ex25(3) + " | " + SRC.debt2(53), explain:"True — green bonds dominate GSS+; social and sustainability bonds remain niche, and SLB/transition are negligible by volume." },
  { id:"e26", topic:"esg-screened", type:"mcq", q:"True or false: ESG-screened bonds can only be issued by corporations with high ESG ratings.", options:["True","False"], correct:1, src: SRC.ex25(3) + " | " + SRC.debt2(57), explain:"False — screening is applied by investors at portfolio level; it is not an issuance condition on the issuer." },
  { id:"e27", topic:"esg-ratings", type:"mcq", q:"True or false: ESG ratings that follow a similar rating approach typically do NOT differ from each other.", options:["True","False"], correct:1, src: SRC.ex24(5) + " | " + SRC.esgr(23), explain:"False — even similar approaches differ due to different criteria, weights, data and proprietary models." },
  { id:"e28", topic:"esg-ratings", type:"mcq", q:"True or false: ESG ratings are based on broadly accepted standards.", options:["True","False"], correct:1, src: SRC.ex24(5) + " | " + SRC.ex25(5), explain:"False — there is no single accepted standard; a rating is the subjective opinion of the agency." },
  { id:"e29", topic:"esg-ratings", type:"mcq", q:"True or false: An ESG rating is the subjective opinion of a rating agency.", options:["True","False"], correct:0, src: SRC.ex25(5) + " | " + SRC.esgr(16), explain:"True — agencies themselves state ratings are opinions, interpreted relative to industry peers." },
  { id:"e30", topic:"esg-ratings", type:"mcq", q:"True or false: Physical climate risks are NOT considered by ESG ratings.", options:["True","False"], correct:0, src: SRC.ex25(5) + " | " + SRC.esgr(14), explain:"True (per the exam framing) — financial-risk-oriented ESG ratings focus on financially material, mostly transition-type ESG issues and do not systematically capture physical climate risk." },

  // ----- Single-choice (from exams) -----
  { id:"e31", topic:"re-relevance", type:"mcq", q:"Exam 2024 · A4: What proportion of natural resources does real estate + buildings consume worldwide?", options:["10%","30%","50%","70%"], correct:2, src: SRC.ex24(4) + " | " + SRC.re(30), explain:"~50% of total natural resource consumption." },
  { id:"e32", topic:"re-relevance", type:"mcq", q:"Exam 2024 · A4: What proportion of CO₂ is emitted worldwide by real estate + buildings?", options:["20%","40%","60%","80%"], correct:1, src: SRC.ex24(4) + " | " + SRC.re(30), explain:"~40% of CO₂ emissions." },
  { id:"e33", topic:"re-relevance", type:"mcq", q:"Exam 2024 · A4: Real estate + buildings consume approximately what share of final energy consumption worldwide?", options:["1/5","1/3","1/2","2/3"], correct:1, src: SRC.ex24(4) + " | " + SRC.re(30), explain:"~1/3 of final energy consumption." },
  { id:"e34", topic:"re-relevance", type:"mcq", q:"Exam 2024 · A4: Global building floor area grew ~23% (2010–2018) at ~2.5%/yr — doubling in about how many years?", options:["18","28","38","48"], correct:1, src: SRC.ex24(4) + " | " + SRC.re(30), explain:"~28 years (rule of 72 ≈ 72/2.5)." },
  { id:"e35", topic:"re-relevance", type:"mcq", q:"Exam 2024 · A4: Which statement about the concept of sustainability is NOT correct?", options:["It has been around for over 300 years","It originates in the overexploitation of forests","In forestry it means cutting no more wood than can regrow","It has only existed since Chernobyl (1986)"], correct:3, src: SRC.ex24(4) + " | " + SRC.re(27), explain:"The concept is centuries old (forestry origin); it did not begin with Chernobyl." },
  { id:"e36", topic:"building-std", type:"mcq", q:"Exam 2024 · A4: Which Swiss building standard most comprehensively reflects sustainability?", options:["Minergie (-P/-A)","Minergie (-P/-A)-ECO","SNBS","GEAK"], correct:2, src: SRC.ex24(4) + " | " + SRC.re(44), explain:"SNBS covers all three pillars (society, economy, environment); Minergie/GEAK are energy-focused." },
  { id:"e37", topic:"green-premium", type:"mcq", q:"Exam · A4: In ln(Price)=β0+β1·MINERGIE+…, β1=0.045 (p<0.01). Approx. price mark-up for a certified building?", options:["≈ 0.45%","≈ 4.5%","≈ 45%","Cannot be determined"], correct:1, src: SRC.ex25(4) + " | " + SRC.re(59), explain:"In a log-linear model the dummy coefficient ≈ the % mark-up → ~4.5%." },
  { id:"e38", topic:"gb-benefits", type:"mcq-multi", q:"Exam 2025 · A4: Which statement(s) about Kats' (2003) «green bill» study are correct? (select all)", options:["Energy savings are ~10× the productivity gains","Total financial benefits are ~10× the initial design & construction costs"], correct:[1], src: SRC.ex25(4) + " | " + SRC.re(75), explain:"It's the reverse for the first: productivity gains are ~10× the energy savings. The total benefits being ~10× initial costs is correct." },
  { id:"e39", topic:"mortgages", type:"mcq-multi", q:"Exam 2025 · A4: Which are Scope 3 emissions for a bank? (select all)", options:["Emissions caused by financing & investments","Purchase of district heating/cooling","Electricity generation in bank branches","Commuting emissions"], correct:[0,3], src: SRC.ex25(4) + " | " + SRC.re(17), explain:"Financed emissions and commuting are Scope 3. District heating/cooling purchased = Scope 2; own electricity generation = Scope 1." },
  { id:"e40", topic:"gb-benefits", type:"mcq-multi", q:"Exam 2025 · A4: Which are TRUE about sustainable vs. conventional real estate? (select all)", options:["Lower vacancy risk","Always higher construction costs","Lower risk premiums","Healthier & more productive environment for users"], correct:[0,2,3], src: SRC.ex25(4) + " | " + SRC.re(77), explain:"Construction costs are NOT always higher (evidence mixed). Lower vacancy risk, lower risk premiums and healthier environments are supported." },

  // ----- Risk/return valuation (from both exams) -----
  { id:"e41", topic:"gb-benefits", type:"mcq", q:"Exam · A4: A decrease in operating costs Ct (more efficient facility management) — the property value V…", options:["Goes up","Goes down","Stays the same"], correct:0, src: SRC.ex24(4) + " | " + SRC.re(72), explain:"Lower Ct → higher net income → V ↑." },
  { id:"e42", topic:"gb-benefits", type:"mcq", q:"Exam · A4: An increase in future rent growth Rt — the property value V…", options:["Goes up","Goes down","Stays the same"], correct:0, src: SRC.ex24(4) + " | " + SRC.re(72), explain:"Higher rents → V ↑." },
  { id:"e43", topic:"gb-benefits", type:"mcq", q:"Exam · A4: An increased risk premium RP (stricter construction regulations) — the property value V…", options:["Goes up","Goes down","Stays the same"], correct:1, src: SRC.ex24(4) + " | " + SRC.re(72), explain:"Higher RP → higher gross cap rate → V ↓." },
  { id:"e44", topic:"gb-benefits", type:"mcq", q:"Exam · A4: Interest rates increase further — the property value V…", options:["Goes up","Goes down","Stays the same"], correct:1, src: SRC.ex24(4) + " | " + SRC.re(72), explain:"Higher risk-free rate → higher discount/cap rate → V ↓." },
  { id:"e45", topic:"climate-risk", type:"mcq-multi", q:"Exam · A6: Which of these are TRANSITION risks? (select all)", options:["Increased demand for sustainable products","Increasing temperature over the years","Less snow in winter","Increased CO₂-tax","Polluted drinking water","Increased subsidies for electric cars"], correct:[0,3,5], src: SRC.ex24(6) + " | " + SRC.rm(17), explain:"Transition: demand shift, CO₂ tax, EV subsidies. Physical: rising temperature, less snow, polluted water." },

  // ----- Extra MCQs derived from the slides -----
  { id:"n01", topic:"intro", type:"mcq", q:"The Brundtland Report is associated with which concept?", options:["The EU Taxonomy","The definition of sustainable development","The Green Bond Principles","Double materiality"], correct:1, src: SRC.intro(10), explain:"The Brundtland Report (1987) gave the classic definition of sustainable development." },
  { id:"n02", topic:"intro", type:"mcq", q:"How many UN Sustainable Development Goals are there?", options:["8","12","17","21"], correct:2, src: SRC.intro(11), explain:"17 SDGs, adopted in 2015 within the 2030 Agenda." },
  { id:"n03", topic:"intro", type:"mcq", q:"The Paris Agreement aims to limit warming to…", options:["Well below 2°C, pursuing 1.5°C","Exactly 3°C","Below 0.5°C","No specific target"], correct:0, src: SRC.intro(13), explain:"Well below 2°C above pre-industrial levels, pursuing efforts toward 1.5°C." },
  { id:"n04", topic:"green-bonds", type:"mcq", q:"How many core components do the ICMA Green Bond Principles have?", options:["2","4","5","10"], correct:1, src: SRC.debt1(18), explain:"Four core components (+ two recommendations)." },
  { id:"n05", topic:"slb", type:"mcq", q:"How many core components do the ICMA Sustainability-Linked Bond Principles have?", options:["3","4","5","6"], correct:2, src: SRC.debt2(37), explain:"Five core components (KPIs, SPTs, bond characteristics, reporting, verification)." },
  { id:"n06", topic:"slb", type:"mcq", q:"The most common consequence if an SLB issuer misses its SPT is a…", options:["Coupon step-down","Coupon step-up","Mandatory redemption","Loss of the green label"], correct:1, src: SRC.debt2(35), explain:"A coupon step-up (higher interest) is the most common consequence." },
  { id:"n07", topic:"slb", type:"mcq", q:"Who issued the first sustainability-linked bond, and when?", options:["EIB, 2007","Enel, 2019","Novartis, 2020","Holcim, 2020"], correct:1, src: SRC.debt2(35), explain:"Enel issued the first SLB in 2019 (the first green bond was the EIB in 2007)." },
  { id:"n08", topic:"green-bonds", type:"mcq", q:"Blue bonds are best described as…", options:["A type of social bond","A subset of green bonds for ocean projects","A sustainability-linked bond","A conventional bond"], correct:1, src: SRC.debt1(23), explain:"Blue bonds are a subset of green bonds financing ocean-based / Blue Economy projects (SDG 14)." },
  { id:"n09", topic:"esg-ratings", type:"mcq", q:"Most ESG ratings follow which approach?", options:["Ethical-ecological (impact)","Financial-risk-oriented","Purely governance-based","Carbon-only"], correct:1, src: SRC.esgr(14), explain:"Most ratings measure financially material ESG risks (financial materiality)." },
  { id:"n10", topic:"esg-ratings", type:"mcq", q:"MSCI ESG ratings are interpreted…", options:["On an absolute scale","Relative to industry peers","Only vs. the S&P 500","Independently of industry"], correct:1, src: SRC.esgr(22), explain:"Ratings are explicitly relative to industry peers (AAA best to CCC worst)." },
  { id:"n11", topic:"esg-ratings", type:"mcq", q:"Inrate's ESG Impact Ratings primarily measure…", options:["Financial materiality of ESG risk","A company's positive & negative impact on environment & society","Credit risk","Governance only"], correct:1, src: SRC.esgr(16), explain:"Inrate measures eco-social IMPACT, unlike the financial-risk-oriented MSCI/Sustainalytics approach." },
  { id:"n12", topic:"climate-risk", type:"mcq", q:"According to FINMA, climate risk is…", options:["A brand-new risk category","A new risk driver within existing categories","Not relevant to banks","Only an operational risk"], correct:1, src: SRC.rm(14), explain:"FINMA: a new risk DRIVER, captured within classic categories (credit, market, insurance, operational)." },
  { id:"n13", topic:"transition", type:"mcq", q:"When were the ICMA Climate Transition Bond Guidelines published?", options:["2007","2019","November 2025","2030"], correct:2, src: SRC.debt2(48), explain:"Published November 2025; CTBs follow the GBP's four core components with adaptations." },
  { id:"n14", topic:"gss-market", type:"mcq", q:"Which label makes up the majority of the GSS+ market by volume?", options:["Social bonds","Sustainability bonds","Green bonds","Sustainability-linked bonds"], correct:2, src: SRC.debt2(53), explain:"Green bonds are ~62% of GSS+; GSS together is ~95% of GSS+." },
  { id:"n15", topic:"gss-market", type:"mcq", q:"Which region has led GSS+ issuance every year since 2017?", options:["North America","APAC","Europe","Middle East & Africa"], correct:2, src: SRC.debt2(54), explain:"Europe leads by far (~47%), APAC second (~24%)." },
  { id:"n16", topic:"building-std", type:"mcq", q:"GRESB evaluates sustainability at the level of…", options:["Individual properties only","Real estate companies & funds (portfolio level)","Individual mortgages","Countries"], correct:1, src: SRC.re(50), explain:"GRESB benchmarks portfolios/funds; LEED & BREEAM focus on individual buildings." },
  { id:"n17", topic:"building-std", type:"mcq", q:"GEAK assigns how many energy classes?", options:["3 (A–C)","5 (A–E)","7 (A–G)","10 (A–J)"], correct:2, src: SRC.re(43), explain:"Seven classes A–G, based on envelope efficiency, total energy efficiency and direct CO₂ emissions." },
  { id:"n18", topic:"green-premium", type:"mcq", q:"The hedonic method is used to…", options:["Set coupon rates on bonds","Make heterogeneous goods comparable and price each attribute","Calculate Scope 3 emissions","Rate ESG controversies"], correct:1, src: SRC.re(56), explain:"It uses multiple regression to estimate the implicit price of each property attribute, incl. 'green'." },
  { id:"n19", topic:"scenario", type:"mcq", q:"RCPs (IPCC) were replaced in the 6th assessment report by…", options:["NGFS scenarios","SSPs (Shared Socioeconomic Pathways)","IEA policy scenarios","TCFD scenarios"], correct:1, src: SRC.rm(41), explain:"SSPs replaced RCPs with the sixth IPCC progress report." },
  { id:"n20", topic:"scenario", type:"mcq", q:"A stress test is best described as assessing…", options:["Probabilistic uncertainty via random sampling","Resilience to an extreme adverse shock","A small change in one variable","The probability vs. impact matrix"], correct:1, src: SRC.rm(32), explain:"Stress test = resilience to extreme shocks (e.g. GDP −8% & energy +100%). Monte Carlo = probabilistic; sensitivity = small parameter change." },
  { id:"n21", topic:"double-mat", type:"mcq", q:"Financial materiality (in double materiality) captures…", options:["The company's impact on society/environment","The impact of ESG/climate factors on the company's success","Only carbon emissions","Only governance issues"], correct:1, src: SRC.intro(23), explain:"Financial materiality = outside-in (impact ON the company); impact materiality = inside-out (company's impact on the world)." },
  { id:"n22", topic:"double-mat", type:"mcq", q:"An activity has «additionality» when…", options:["It would have happened anyway","The intervention is what causes it to happen vs. the baseline","It is profitable","It is certified green"], correct:1, src: SRC.intro(26), explain:"Additionality = impact with intervention minus the baseline without it." },
  { id:"n23", topic:"reg-greenwash", type:"mcq", q:"The OECD Guidelines for Multinational Enterprises are…", options:["Legally binding on all firms","Recommendations to MNEs (morally, not legally, binding) with National Contact Points","An ICMA bond standard","A building certification"], correct:1, src: SRC.intro(48), explain:"Recommendations to MNEs — 'morally binding'; each country must set up a National Contact Point (a legal obligation)." },
  { id:"n24", topic:"financing", type:"mcq", q:"On the secondary market, the price of debt is…", options:["Fixed at issue until repayment","Fluctuating depending on various factors","Always at par","Set by the borrower"], correct:1, src: SRC.intro(30), explain:"Secondary-market prices fluctuate; primary-market conditions are fixed at issuance." },
  { id:"n25", topic:"mortgages", type:"mcq", q:"Under Swiss Basel III (from 2025), banks need significantly more equity when the LTV exceeds…", options:["40%","60%","80%","90%"], correct:1, src: SRC.re(20), explain:"Above 60% LTV costs rise sharply, passed on as higher mortgage rates." },
  { id:"n26", topic:"controversies", type:"mcq", q:"Which is an example of a controversial PRODUCT (vs. a practice)?", options:["Bribery","Discrimination","Tobacco","Fraud"], correct:2, src: SRC.esgr(25), explain:"Tobacco is a controversial product; bribery, discrimination and fraud are controversial business practices." },
  { id:"n27", topic:"esg-screened", type:"mcq", q:"Excluding issuers that fail the UN Global Compact is an example of…", options:["Values-based exclusion","Norms-based exclusion","Best-in-class selection","Positive screening"], correct:1, src: SRC.debt2(58), explain:"UN Global Compact = international norm → norms-based exclusion. Tobacco/weapons = values-based." },
  { id:"n28", topic:"social-bonds", type:"mcq", q:"The main difference between the ICMA SBP and GBP is…", options:["The number of core components","The project objective (social vs. environmental)","Whether external review is needed","Whether they are binding"], correct:1, src: SRC.debt1(26), explain:"Same structure; the difference is social vs. environmental project objectives." },
  { id:"n29", topic:"gb-benefits", type:"mcq", q:"Per Kats (2003), productivity benefits of green measures are roughly…", options:["Equal to energy savings","10× the energy savings","Half the energy savings","Irrelevant"], correct:1, src: SRC.re(75), explain:"Productivity gains ≈ 10× the energy savings; total benefits ≈ 10× initial costs." },
  { id:"n30", topic:"risk-mgmt", type:"mcq", q:"«Exclusion» as a lender field of action means…", options:["Charging a green discount","Explicitly NOT financing certain companies/sectors/property types","Financing start-ups","Consulting on sustainability"], correct:1, src: SRC.rm(8), explain:"Exclusion = refusing to finance certain firms/sectors; it sits on the risk side of lender actions." },
];

/* ============================ FORMULAS (light — SF is framework-heavy) ============================ */
const FORMULAE = [
  { id:"f1", title:"Green bond premium (greenium)", formula:"Greenium = Yield(conventional) − Yield(green), otherwise identical bonds", note:"A positive value (green yields less) means cheaper financing. Evidence: ~0–19 bps globally, ~12 bps average; CHF greenium has declined.", src: SRC.debt1(21) + " | " + SRC.debt1(22) },
  { id:"f2", title:"Additionality", formula:"Additionality = Impact WITH intervention − Impact WITHOUT intervention (baseline)", note:"The basis for distinguishing true impact from mere alignment; primary-market financing can be additional, secondary-market trading generally is not.", src: SRC.intro(26) },
  { id:"f3", title:"Hedonic regression (log-linear)", formula:"ln(Price) = β0 + β1·MINERGIE + β2·living_space + … + ε", note:"With a green dummy, the coefficient β1 ≈ the % price mark-up. e.g. β1 = 0.045 → ~4.5% premium for a certified building.", src: SRC.re(57) + " | " + SRC.re(59) },
  { id:"f4", title:"Property valuation (earnings-value / cap rate)", formula:"V = Rt ÷ (i_gross − g)   ;   i_gross = rf + RP", note:"V = current earnings value; Rt = gross yield (net rents); g = rent growth; i_gross = gross cap rate = risk-free + risk premium. Green buildings raise V via Ct↓, Rt↑, or RP↓.", src: SRC.re(71) + " | " + SRC.re(72) },
  { id:"f5", title:"Three value channels of a green building", formula:"V ↑  ⇐  (1) Ct ↓   or   (2) Rt ↑   or   (3) RP ↓ ⇒ i_gross ↓", note:"Decreased operating costs, increased net rents, or a lower risk premium each increase value V.", src: SRC.re(72) },
  { id:"f6", title:"Greenhouse-gas scopes (a bank)", formula:"Total = Scope 1 (own direct) + Scope 2 (purchased energy) + Scope 3 (value chain, incl. financed emissions)", note:"For banks, Scope 3 financed emissions dominate; district heating/cooling = Scope 2; own branch generation = Scope 1; commuting = Scope 3.", src: SRC.re(17) },

function ProgressRing({ percent, size=140, stroke=12, color="#059669", label, sub }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.max(0, Math.min(100, percent)) / 100) * c;
  return (
    <div className="relative inline-flex items-center justify-center" style={{ width:size, height:size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke="rgba(15,23,42,0.06)" strokeWidth={stroke} fill="none" />
        <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} className="ring-bar"/>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="font-display text-3xl font-semibold text-slate-900">{Math.round(percent)}%</div>
        {label && <div className="text-[11px] text-slate-500 mt-0.5">{label}</div>}
        {sub && <div className="text-[10px] text-slate-400">{sub}</div>}
      </div>
    </div>
  );
}

function Sparkline({ weight, tone="indigo" }) {
  const w = Math.max(1, Math.min(5, weight));
  const top=4, bot=22, range = bot-top;
  const ys = [
    bot - range * (0.20 + (w-1)*0.06),
    bot - range * (0.40 + (w-1)*0.05),
    bot - range * (0.32 + (w-1)*0.08),
    bot - range * (0.55 + (w-1)*0.06),
    bot - range * (0.48 + (w-1)*0.08),
    bot - range * (0.62 + (w-1)*0.07),
    bot - range * (0.74 + (w-1)*0.05),
  ];
  const pts = ys.map((y, i) => `${i * 12 + 2},${y.toFixed(1)}`).join(' ');
  const colorMap = { indigo:"#4F46E5", amber:"#D97706", slate:"#64748B" };
  const color = colorMap[tone] || colorMap.indigo;
  const lastX = 6 * 12 + 2; const lastY = ys[ys.length-1];
  return (
    <svg width={78} height={26} viewBox="0 0 78 26" className="overflow-visible">
      <defs><linearGradient id={`grad-${tone}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`2,${bot} ${pts} ${lastX},${bot}`} fill={`url(#grad-${tone})`}/>
      <polyline fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" points={pts}/>
      <circle cx={lastX} cy={lastY} r="2.2" fill={color}/>
    </svg>
  );
}

/* ======================== LOGIN ======================== */
function LoginScreen({ onLogin }){
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const submit = async (e) => {
    if (e) e.preventDefault();
    const trimmed = name.trim();
    if (!trimmed) { setError("Please enter your name."); return; }
    if (trimmed.length < 2) { setError("Name too short."); return; }
    if (trimmed.length > 32) { setError("Name too long (max 32)."); return; }
    setBusy(true); setError(null);
    try {
      await onLogin(trimmed);
    } catch (err) {
      setError(err.message || "Login failed.");
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="w-full max-w-sm fade-in">
        <div className="text-center mb-6">
          <div className="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-white shadow-soft mb-3">
            <span className="text-2xl">🌱</span>
          </div>
          <h1 className="font-display text-2xl font-semibold text-slate-900">SF Study</h1>
          <p className="text-[13px] text-slate-500 mt-1">HSLU MSc · Sustainable Financing · Multiplayer Edition</p>
        </div>

        <form onSubmit={submit} className="surface-card shadow-soft p-5 space-y-3">
          <label className="block">
            <span className="text-[12px] text-slate-500 font-medium">Your name</span>
            <input
              type="text"
              value={name}
              onChange={e=>setName(e.target.value)}
              placeholder="e.g. Pascal"
              maxLength={32}
              autoFocus
              className="mt-1 w-full rounded-xl border border-[rgba(15,23,42,0.08)] bg-white px-3.5 py-2.5 text-[15px] focus:border-indigo-500"
            />
          </label>

          {error && (
            <div className="text-[12px] text-rose-700 bg-rose-50 border border-rose-200 rounded-lg px-2.5 py-1.5">{error}</div>
          )}

          <button
            type="submit"
            disabled={busy}
            className="tap btn w-full rounded-xl bg-[#059669] text-white font-semibold py-3 shadow-accent hover:bg-[#047857] disabled:opacity-60">
            {busy ? "Logging in…" : "Start studying"}
          </button>

          <p className="text-[11px] text-slate-400 text-center leading-relaxed">
            Your name is public on the leaderboard. Your progress is saved across all your devices.
          </p>
        </form>
      </div>
    </div>
  );
}
