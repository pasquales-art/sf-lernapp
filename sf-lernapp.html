/* ======================== DASHBOARD ======================== */
function Dashboard({ onPickTopic, onWeakSpots, leitner, totalCards, totalQuiz, streak, displayName }){
  const ranked = [...TOPICS].sort((a,b)=> b.weight - a.weight);
  const countByTopic = useMemo(()=>{
    const m = {};
    CARDS.forEach(c=>{ m[c.topic] = (m[c.topic]||0) + 1; });
    return m;
  }, []);
  const counts = useMemo(()=>{
    const c = { neu:0, lernen:0, sitzt:0 };
    Object.values(leitner).forEach(v=>{
      if (v==="sitzt") c.sitzt++;
      else if (v==="lernen") c.lernen++;
      else c.neu++;
    });
    const open = totalCards - (c.lernen + c.sitzt + c.neu);
    if (open > 0) c.neu += open;
    return c;
  }, [leitner, totalCards]);
  const percent = totalCards === 0 ? 0 : (counts.sitzt / totalCards) * 100;
  const weakCount = useMemo(()=> CARDS.filter(c => leitner[c.id]==="neu" || leitner[c.id]==="lernen").length, [leitner]);

  return (
    <div className="max-w-3xl mx-auto px-4 py-6 space-y-6 fade-in">
      <header className="space-y-1">
        <h1 className="font-display text-3xl font-semibold text-slate-900 leading-tight">
          Welcome back{displayName ? `, ${displayName}` : ""}
        </h1>
        <p className="text-[14px] text-slate-500">Content sourced exclusively from your HSLU materials. Topics sorted by exam frequency.</p>
      </header>

      <section className="surface-card shadow-soft p-5">
        <div className="flex flex-col sm:flex-row items-center gap-5">
          <ProgressRing percent={percent} color="#059669" label="Mastered" sub={`${counts.sitzt} / ${totalCards} cards`} />
          <div className="flex-1 w-full grid grid-cols-3 gap-2.5">
            <MiniStat tone="slate"   value={counts.neu}    label="New" />
            <MiniStat tone="amber"   value={counts.lernen} label="Learning" />
            <MiniStat tone="emerald" value={counts.sitzt}  label="Got it" />
            <MiniStat tone="indigo"  value={totalCards}    label="Flashcards" />
            <MiniStat tone="indigo"  value={totalQuiz}     label="Quiz items" />
            <MiniStat tone="indigo"  value={GLOSSARY.length} label="Glossary" />
          </div>
        </div>
        <button onClick={onWeakSpots}
          className="tap btn mt-4 w-full rounded-xl border border-rose-200 bg-rose-50/60 text-rose-800 py-2.5 text-[13px] font-medium hover:bg-rose-100 flex items-center justify-center gap-2">
          <Icon.Alert size={15}/>
          Review weak spots {weakCount > 0 ? `(${weakCount})` : "— none yet"}
        </button>
      </section>

      <section className="space-y-2">
        <div className="flex items-center justify-between px-1">
          <h2 className="font-display text-sm font-semibold text-slate-700">Topics by exam frequency</h2>
          <span className="text-[11px] text-slate-400">Tap to study</span>
        </div>
        <ul className="space-y-2">
          {ranked.map((t,i)=> {
            const prio = priorityForWeight(t.weight);
            const sty = priorityStyles[prio.tone];
            return (
              <li key={t.id}>
                <button onClick={()=>onPickTopic(t.id)}
                  className="tap btn lift-hover w-full text-left surface-card shadow-soft p-4 flex items-center gap-3 hover:shadow-lift">
                  <span className={"inline-flex items-center justify-center w-7 h-7 rounded-full font-mono text-[11px] " + sty.chip}>{i+1}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-[14px] font-medium text-slate-900 truncate leading-tight">{t.name}</div>
                    <div className="mt-1 flex items-center gap-2 text-[11px] text-slate-500">
                      <span className={"inline-block w-1.5 h-1.5 rounded-full " + sty.dot}></span>
                      <span>{prio.label} priority</span>
                      <span className="text-slate-300">·</span>
                      <span>{countByTopic[t.id] || 0} cards</span>
                    </div>
                  </div>
                  <div className="shrink-0"><Sparkline weight={t.weight} tone={prio.tone}/></div>
                  <span className="text-slate-400"><Icon.ChevronRight size={14}/></span>
                </button>
              </li>
            );
          })}
        </ul>
      </section>
    </div>
  );
}

/* ======================== FLASHCARDS (with weak-spots) ======================== */
function FlashcardMode({ leitner, setLeitner, topicFilter, setTopicFilter, onMark }){
  const filteredCards = useMemo(()=>{
    if (topicFilter === "weak") return CARDS.filter(c => leitner[c.id]==="neu" || leitner[c.id]==="lernen");
    if (!topicFilter || topicFilter==="all") return CARDS;
    return CARDS.filter(c=>c.topic===topicFilter);
  }, [topicFilter, leitner]);

  const queue = useMemo(()=>{
    const tier = (id) => {
      const s = leitner[id];
      if (s==="sitzt") return 2;
      if (s==="lernen") return 1;
      return 0;
    };
    if (topicFilter === "weak") return filteredCards;
    return [...filteredCards].sort((a,b)=> tier(a.id) - tier(b.id));
  }, [filteredCards, leitner, topicFilter]);

  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showSrc, setShowSrc] = useState(false);

  useEffect(()=>{ setIdx(0); setFlipped(false); setShowSrc(false); }, [topicFilter]);

  function markCurrent(status){
    const card = queue[idx % queue.length];
    if (!card) return;
    setLeitner(prev => ({ ...prev, [card.id]: status }));
    onMark && onMark(status, card.id, queue);
    setFlipped(false);
    setShowSrc(false);
    setIdx(i => i + 1);
  }

  useEffect(()=>{
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (queue.length === 0) return;
      if (e.code === "Space") { e.preventDefault(); setFlipped(f=>!f); }
      else if (e.code === "ArrowRight" || e.code === "ArrowDown") { e.preventDefault(); setIdx(i=>i+1); setFlipped(false); setShowSrc(false); }
      else if (e.code === "ArrowLeft"  || e.code === "ArrowUp")   { e.preventDefault(); setIdx(i=>Math.max(0, i-1)); setFlipped(false); setShowSrc(false); }
      else if (e.key === "1") { e.preventDefault(); markCurrent("neu"); }
      else if (e.key === "2") { e.preventDefault(); markCurrent("lernen"); }
      else if (e.key === "3") { e.preventDefault(); markCurrent("sitzt"); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
    // eslint-disable-next-line
  }, [queue, idx, leitner]);

  const isWeak = topicFilter === "weak";

  const ChipRow = () => (
    <div className="flex items-center gap-1.5 overflow-x-auto scrollbar-hide pb-1">
      <TopicChip active={isWeak} tone="rose" onClick={()=>setTopicFilter("weak")}>⚠ Weak spots</TopicChip>
      <TopicChip active={topicFilter==="all" || !topicFilter} onClick={()=>setTopicFilter("all")}>All</TopicChip>
      {TOPICS.map(t=>(<TopicChip key={t.id} active={topicFilter===t.id} onClick={()=>setTopicFilter(t.id)}>{t.name}</TopicChip>))}
    </div>
  );

  if (queue.length === 0) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in">
        <ChipRow/>
        <div className="surface-card shadow-soft p-8 text-center text-slate-500">
          {isWeak
            ? "No weak spots right now — nothing marked «Again» or «Learning». Study some cards and the ones you struggle with will collect here. 🌱"
            : "No cards for this topic."}
        </div>
      </div>
    );
  }

  const card = queue[idx % queue.length];
  const state = leitner[card.id] || "neu";

  const filteredProgressPct = queue.length === 0 ? 0 :
    (queue.filter(c => leitner[c.id] === "sitzt").length / queue.length) * 100;

  return (
    <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in safe-bottom">
      <ChipRow/>
      <div className="flex items-center justify-between">
        <div className="text-[12px] text-slate-500 font-mono tabular-nums">{(idx % queue.length) + 1} / {queue.length}{isWeak ? " · weak spots" : ""}</div>
        <Badge state={state} />
      </div>

      <div className="perspective-card">
        <div className={classNames("card-flip relative w-full min-h-[320px]", flipped && "is-flipped")} onClick={()=>setFlipped(f=>!f)}>
          <div className="card-face absolute inset-0">
            <div className="surface-card shadow-soft p-6 min-h-[320px] flex flex-col">
              <div className="flex items-center justify-between">
                <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">{tagForTopic(card.topic)}</div>
                <div className="text-slate-300"><Icon.BookOpen size={14}/></div>
              </div>
              <div className="mt-4 text-[17px] sm:text-[19px] font-display font-medium text-slate-900 leading-snug whitespace-pre-wrap">{card.q}</div>
              <div className="mt-auto pt-4 text-[12px] text-slate-400 flex items-center gap-2"><span className="kbd">space</span><span>to reveal</span></div>
            </div>
          </div>
          <div className="card-face card-back absolute inset-0">
            <div className="surface-card shadow-soft p-6 min-h-[320px] flex flex-col bg-gradient-to-b from-white to-[#F0FBF5]">
              <div className="flex items-center justify-between">
                <div className="text-[11px] uppercase tracking-[0.08em] text-emerald-600 font-mono">Answer</div>
                <span className="text-emerald-400"><Icon.Leaf size={14}/></span>
              </div>
              <div className="mt-3 text-[15px] text-slate-800 leading-[1.65] whitespace-pre-wrap">{card.a}</div>
              <div className="mt-4">
                <button onClick={(e)=>{ e.stopPropagation(); setShowSrc(s=>!s); }} className="text-[12px] text-emerald-700 hover:text-emerald-800 underline underline-offset-4">{showSrc ? "Hide source" : "Show source"}</button>
                {showSrc && (<div className="mt-2 text-[12px] text-slate-600 bg-white rounded-lg border border-[rgba(15,23,42,0.06)] p-2.5">{card.src}</div>)}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2">
        <RatingBtn onClick={()=>markCurrent("neu")} tone="rose" shortcut="1">Again</RatingBtn>
        <RatingBtn onClick={()=>markCurrent("lernen")} tone="amber" shortcut="2">Learning</RatingBtn>
        <RatingBtn onClick={()=>markCurrent("sitzt")} tone="emerald" shortcut="3">Got it</RatingBtn>
      </div>

      <div className="surface-card shadow-soft p-3">
        <div className="flex items-center justify-between text-[11px] text-slate-500 mb-1.5">
          <span>{isWeak ? "Weak-spots progress" : "Topic progress"}</span>
          <span className="font-mono tabular-nums">{Math.round(filteredProgressPct)}%</span>
        </div>
        <div className="w-full h-2 rounded-full bg-slate-100 overflow-hidden">
          <div className="h-full bg-[#059669] ring-bar" style={{ width: `${filteredProgressPct}%` }}/>
        </div>
      </div>

      <div className="hidden sm:flex items-center justify-center gap-3 text-[11px] text-slate-400">
        <span className="flex items-center gap-1"><span className="kbd">space</span> flip</span>
        <span className="flex items-center gap-1"><span className="kbd">←</span><span className="kbd">→</span> nav</span>
        <span className="flex items-center gap-1"><span className="kbd">1</span><span className="kbd">2</span><span className="kbd">3</span> rate</span>
      </div>
    </div>
  );
}

/* ======================== QUIZ (with open-question self-grading) ======================== */
function QuizMode(){
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [graded, setGraded] = useState(false);
  const [showSrc, setShowSrc] = useState(false);
  const [score, setScore] = useState({ c:0, total:0 });
  const [topicFilter, setTopicFilter] = useState("all");
  const [examOnly, setExamOnly] = useState(false);

  const items = useMemo(()=>{
    let q = QUIZ;
    if (examOnly) q = q.filter(x => x.id.startsWith("e"));
    if (topicFilter !== "all") q = q.filter(x => x.topic === topicFilter);
    return q;
  }, [topicFilter, examOnly]);

  useEffect(()=>{ setIdx(0); setPicked(null); setRevealed(false); setGraded(false); setShowSrc(false); }, [topicFilter, examOnly]);

  if (items.length === 0) { return <div className="max-w-3xl mx-auto px-4 py-10 text-center text-slate-500">No quiz items match the current filter.</div>; }
  const q = items[idx % items.length];

  const submit = ()=>{
    if (revealed) return;
    setRevealed(true);
    if (q.type === "open") return; // scored via self-grade buttons
    setScore(s=>{
      let isCorrect = false;
      if (q.type === "mcq") isCorrect = picked === q.correct;
      else if (q.type === "mcq-multi") {
        const a = Array.isArray(picked) ? [...picked].sort() : [];
        const b = [...q.correct].sort();
        isCorrect = a.length === b.length && a.every((v,i)=>v===b[i]);
      }
      return { c: s.c + (isCorrect?1:0), total: s.total + 1 };
    });
  };
  const selfGrade = (val)=>{
    if (graded) return;
    setGraded(true);
    setScore(s=>({ c: s.c + val, total: s.total + 1 }));
  };
  const next = ()=>{ setIdx(i=>i+1); setPicked(null); setRevealed(false); setGraded(false); setShowSrc(false); };
  const pct = score.total === 0 ? 0 : Math.round(100 * score.c / score.total);

  return (
    <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in safe-bottom">
      <div className="flex items-center gap-1.5 overflow-x-auto scrollbar-hide pb-1">
        <TopicChip active={!examOnly} onClick={()=>setExamOnly(false)}>All items</TopicChip>
        <TopicChip active={examOnly} onClick={()=>setExamOnly(true)}>Past-exam only</TopicChip>
      </div>
      <div className="flex items-center gap-1.5 overflow-x-auto scrollbar-hide pb-1">
        <TopicChip active={topicFilter==="all"} onClick={()=>setTopicFilter("all")}>All topics</TopicChip>
        {TOPICS.filter(t=>QUIZ.some(qq=>qq.topic===t.id)).map(t=>(<TopicChip key={t.id} active={topicFilter===t.id} onClick={()=>setTopicFilter(t.id)}>{t.name}</TopicChip>))}
      </div>

      <div className="surface-card shadow-soft p-3 flex items-center justify-between">
        <div className="text-[12px] text-slate-500"><span className="font-mono tabular-nums">{(idx % items.length)+1}</span><span className="text-slate-400"> / </span><span className="font-mono tabular-nums">{items.length}</span></div>
        <div className="flex items-center gap-2">
          <div className="text-[12px] text-slate-500">Score</div>
          <div className="font-mono tabular-nums text-[13px] text-slate-900">{score.c} / {score.total}</div>
          <div className="w-16 h-1.5 rounded-full bg-slate-100 overflow-hidden"><div className="h-full bg-emerald-500 ring-bar" style={{ width: `${pct}%` }}/></div>
        </div>
      </div>

      <div className="surface-card shadow-soft p-5 sm:p-6 space-y-3.5">
        <div className="flex flex-wrap items-center gap-2 text-[11px]">
          <span className="font-mono uppercase tracking-[0.08em] text-slate-400">{tagForTopic(q.topic)}</span>
          {q.type==="open" && <span className="px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-700">Open</span>}
          {q.type==="mcq-multi" && <span className="px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-700">Multi-select</span>}
          {q.id.startsWith("e") && <span className="px-1.5 py-0.5 rounded bg-amber-50 text-amber-700">From past exam</span>}
        </div>
        <div className="font-display text-[16px] sm:text-[17px] font-medium text-slate-900 leading-snug whitespace-pre-wrap">{q.q}</div>

        {q.type === "mcq" && (<div className="space-y-2">{q.options.map((o,i)=>{
          const isPicked = picked===i;
          const isCorrect = revealed && q.correct===i;
          const isWrong   = revealed && isPicked && q.correct!==i;
          return (<button key={i} disabled={revealed} onClick={()=>setPicked(i)}
            className={classNames("tap btn w-full text-left rounded-xl border p-3 text-[14px] transition",
              isCorrect ? "border-emerald-300 bg-emerald-50 text-emerald-800" :
              isWrong   ? "border-rose-300 bg-rose-50 text-rose-800" :
              isPicked  ? "border-indigo-400 bg-indigo-50 text-indigo-900 shadow-accent" :
                          "border-[rgba(15,23,42,0.06)] bg-white hover:border-[rgba(15,23,42,0.18)]")}>
            <span className="font-mono font-medium mr-2 text-[12px] inline-flex items-center justify-center w-5 h-5 rounded-md bg-white/70 border border-[rgba(15,23,42,0.06)]">{String.fromCharCode(65+i)}</span>{o}
          </button>);
        })}</div>)}

        {q.type === "mcq-multi" && (<div className="space-y-2">{q.options.map((o,i)=>{
          const arr = Array.isArray(picked) ? picked : [];
          const isPicked = arr.includes(i);
          const isCorrect = revealed && q.correct.includes(i);
          const isWrong   = revealed && isPicked && !q.correct.includes(i);
          return (<button key={i} disabled={revealed}
            onClick={()=>{ if (revealed) return; setPicked(prev=>{ const arr2 = Array.isArray(prev) ? [...prev] : []; const at = arr2.indexOf(i); if (at>=0) arr2.splice(at,1); else arr2.push(i); return arr2; }); }}
            className={classNames("tap btn w-full text-left rounded-xl border p-3 text-[14px] transition",
              isCorrect ? "border-emerald-300 bg-emerald-50 text-emerald-800" :
              isWrong   ? "border-rose-300 bg-rose-50 text-rose-800" :
              isPicked  ? "border-indigo-400 bg-indigo-50 text-indigo-900 shadow-accent" :
                          "border-[rgba(15,23,42,0.06)] bg-white hover:border-[rgba(15,23,42,0.18)]")}>
            <span className="font-mono font-medium mr-2 text-[12px] inline-flex items-center justify-center w-5 h-5 rounded-md bg-white/70 border border-[rgba(15,23,42,0.06)]">{String.fromCharCode(65+i)}</span>{o}
          </button>);
        })}</div>)}

        {q.type === "open" && (<div className="text-[12px] text-slate-500">Open question (from past exam). Think/write your answer, reveal the model answer, then grade yourself.</div>)}

        {!revealed && (<button onClick={submit} className="tap btn w-full rounded-xl bg-[#4F46E5] text-white text-[14px] py-3 font-semibold shadow-accent hover:bg-[#4338CA]">{q.type==="open" ? "Show model answer" : "Check answer"}</button>)}

        {revealed && (<div className="space-y-2.5 pt-1">
          {q.type !== "open" && q.explain && (<div className="text-[14px] text-slate-700 leading-relaxed"><span className="font-semibold">Explanation: </span>{q.explain}</div>)}
          {q.type === "open" && (<div className="rounded-xl border border-[rgba(15,23,42,0.06)] bg-[#F8F9FB] p-3.5 text-[14px] text-slate-800 whitespace-pre-wrap leading-[1.65]">{q.sample}</div>)}

          {q.type === "open" && !graded && (
            <div className="space-y-1.5">
              <div className="text-[12px] text-slate-500">How did you do?</div>
              <div className="grid grid-cols-3 gap-2">
                <RatingBtn onClick={()=>selfGrade(0)}   tone="rose">Missed</RatingBtn>
                <RatingBtn onClick={()=>selfGrade(0.5)} tone="amber">Partial</RatingBtn>
                <RatingBtn onClick={()=>selfGrade(1)}   tone="emerald">Got it</RatingBtn>
              </div>
            </div>
          )}
          {q.type === "open" && graded && (<div className="text-[13px] text-emerald-700">Recorded — added to your score.</div>)}

          <button onClick={()=>setShowSrc(s=>!s)} className="text-[12px] text-indigo-700 hover:text-indigo-800 underline underline-offset-4">{showSrc ? "Hide source" : "Show source"}</button>
          {showSrc && (<div className="text-[12px] text-slate-600 bg-white rounded-lg border border-[rgba(15,23,42,0.06)] p-2.5">{q.src}</div>)}

          {(q.type !== "open" || graded) && (
            <button onClick={next} className="tap btn w-full rounded-xl border border-[rgba(15,23,42,0.06)] bg-white text-slate-800 text-[14px] py-2.5 mt-1 font-medium hover:border-[rgba(15,23,42,0.16)]">Next question →</button>
          )}
        </div>)}
      </div>
    </div>
  );
}

            <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">{f.title}</div>
            <div className="mt-2 font-mono text-[14px] sm:text-[15px] text-slate-900 whitespace-pre-wrap leading-relaxed">{f.formula}</div>
            {f.note && <div className="mt-2 text-[14px] text-slate-600 whitespace-pre-wrap leading-[1.65]">{f.note}</div>}
            <div className="mt-2 text-[11px] text-slate-400">{f.src}</div>
          </li>
        ))}
      </ul>
    </div>
  );
}

/* ======================== FRAMEWORKS / GLOSSARY ======================== */
function GlossarySheet(){
  const [q, setQ] = useState("");
  const norm = (s)=> (s||"").toLowerCase();
  const term = norm(q.trim());
  const cats = useMemo(()=>{
    const order = [];
    const map = {};
    GLOSSARY.forEach(g=>{
      if (term && !(norm(g.term).includes(term) || norm(g.def).includes(term) || norm(g.cat).includes(term))) return;
      if (!map[g.cat]) { map[g.cat] = []; order.push(g.cat); }
      map[g.cat].push(g);
    });
    return order.map(c => ({ cat:c, items: map[c] }));
  }, [term]);

  return (
    <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in safe-bottom">
      <header className="space-y-1 px-1">
        <h1 className="font-display text-3xl font-semibold text-slate-900">Frameworks & glossary</h1>
        <p className="text-[14px] text-slate-500">The acronym-heavy reference: principles, regulation, instruments, ratings & real-estate standards.</p>
      </header>
      <div className="relative">
        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><Icon.Search size={16}/></span>
        <input type="search" value={q} onChange={e=>setQ(e.target.value)}
          placeholder="GBP, SLBP, EU Taxonomy, Scope 3, GRESB, greenium…"
          className="w-full rounded-2xl border border-[rgba(15,23,42,0.06)] bg-white pl-10 pr-4 py-3 text-[15px] shadow-soft"/>
      </div>

      {cats.length === 0 && (<div className="text-center py-10 text-slate-500">No entries match «{q}».</div>)}

      {cats.map(group=>(
        <section key={group.cat} className="space-y-2">
          <h2 className="font-display text-sm font-semibold text-slate-700 px-1 pt-1">{group.cat}</h2>
          <ul className="space-y-2">
            {group.items.map(g=>(
              <li key={g.id} className="surface-card shadow-soft p-4 lift-hover hover:shadow-lift">
                <div className="flex items-start gap-2">
                  <span className="text-emerald-500 mt-0.5 shrink-0"><Icon.Leaf size={14}/></span>
                  <div className="min-w-0">
                    <div className="font-display font-semibold text-slate-900 text-[14px]">{g.term}</div>
                    <div className="mt-1 text-[14px] text-slate-700 leading-[1.6] whitespace-pre-wrap">{g.def}</div>
                    <div className="mt-2 text-[11px] text-slate-400">{g.src}</div>
                  </div>
                </div>
              </li>
            ))}
          </ul>
        </section>
      ))}
    </div>
  );
}

/* ======================== LEADERBOARD ======================== */
function Leaderboard({ currentName }){
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(()=>{
    if (!db) return;
    setLoading(true);
    const unsub = db.collection("users")
      .orderBy("totalGotIt", "desc")
      .limit(100)
      .onSnapshot(
        (snap) => {
          const arr = [];
          snap.forEach(doc => arr.push({ id: doc.id, ...doc.data() }));
          setUsers(arr);
          setLoading(false);
          setError(null);
        },
        (err) => { setError(err.message); setLoading(false); }
      );
    return () => unsub();
  }, []);

  return (
    <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in safe-bottom">
      <header className="space-y-1 px-1">
        <h1 className="font-display text-3xl font-semibold text-slate-900 flex items-center gap-2">
          <span className="text-amber-500"><Icon.Trophy size={26}/></span>
          Leaderboard
        </h1>
        <p className="text-[14px] text-slate-500">Everyone who's studying. Updates live as people mark cards.</p>
      </header>

      {loading && (<div className="text-center py-10 text-slate-500">Loading…</div>)}
      {error && (<div className="text-[13px] text-rose-700 bg-rose-50 border border-rose-200 rounded-lg p-3">Could not load leaderboard: {error}</div>)}

      {!loading && users.length === 0 && (
        <div className="text-center py-10 text-slate-500">No users yet. You're the first!</div>
      )}

      <ul className="space-y-2">
        {users.map((u, i) => {
          const isMe = u.displayName === currentName;
          const masteryPct = u.totalGotIt && CARDS.length ? Math.round(100 * u.totalGotIt / CARDS.length) : 0;
          const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : null;
          return (
            <li key={u.id} className={"surface-card shadow-soft p-3.5 flex items-center gap-3 " + (isMe ? "ring-2 ring-emerald-300" : "")}>
              <div className="shrink-0 w-9 h-9 inline-flex items-center justify-center rounded-full bg-slate-50 font-mono text-[13px] text-slate-700">
                {medal || `#${i+1}`}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 min-w-0">
                  <div className="font-display font-semibold text-slate-900 truncate text-[14px]">
                    {u.displayName || u.id}
                  </div>
                  {isMe && <span className="text-[10px] uppercase tracking-wider text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded-full font-medium">You</span>}
                </div>
                <div className="flex items-center gap-2.5 mt-1 text-[11px] text-slate-500">
                  <span className="flex items-center gap-1 text-orange-600">
                    <Icon.Flame size={11}/>
                    <span className="font-mono tabular-nums">{u.streak || 0}</span>
                  </span>
                  <span className="text-slate-300">·</span>
                  <span>best <span className="font-mono tabular-nums">{u.bestStreak || 0}</span></span>
                  <span className="text-slate-300">·</span>
                  <span className="hidden sm:inline">{timeAgo(u.lastActive)}</span>
                </div>
              </div>
              <div className="shrink-0 text-right">
                <div className="font-display text-[18px] font-semibold text-slate-900 tabular-nums leading-none">{u.totalGotIt || 0}</div>
                <div className="text-[10px] text-slate-400 mt-0.5">mastered · {masteryPct}%</div>
              </div>
            </li>
          );
        })}
      </ul>

      <p className="text-[11px] text-slate-400 text-center px-2 leading-relaxed">
        Sorted by mastered cards (descending). Streak = consecutive «Got it» in a row.
      </p>
    </div>
  );
}

/* ======================== SEARCH ======================== */
function SearchMode(){
  const [q, setQ] = useState("");
  const norm = (s)=> (s||"").toLowerCase();
  const term = norm(q.trim());
  const results = useMemo(()=>{
    if (!term) return { cards:[], quiz:[], formulae:[], glossary:[] };
    const cards = CARDS.filter(c=> norm(c.q).includes(term) || norm(c.a).includes(term) || norm(tagForTopic(c.topic)).includes(term));
    const quiz = QUIZ.filter(c=> norm(c.q).includes(term) || norm(c.explain).includes(term) || norm(c.sample).includes(term));
    const formulae = FORMULAE.filter(f=> norm(f.title).includes(term) || norm(f.formula).includes(term) || norm(f.note).includes(term));
    const glossary = GLOSSARY.filter(g=> norm(g.term).includes(term) || norm(g.def).includes(term));
    return { cards, quiz, formulae, glossary };
  }, [term]);

  return (
    <div className="max-w-3xl mx-auto px-4 py-5 space-y-4 fade-in safe-bottom">
      <header className="space-y-1 px-1">
        <h1 className="font-display text-3xl font-semibold text-slate-900">Search</h1>
        <p className="text-[14px] text-slate-500">Full-text across cards, quiz items, formulas and the glossary.</p>
      </header>
      <div className="relative">
        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><Icon.Search size={16}/></span>
        <input type="search" value={q} onChange={e=>setQ(e.target.value)}
          placeholder="greenium, double materiality, SLB, transition, Scope 3…"
          className="w-full rounded-2xl border border-[rgba(15,23,42,0.06)] bg-white pl-10 pr-4 py-3.5 text-[15px] shadow-soft"/>
      </div>
      {term && (<div className="text-[12px] text-slate-500 px-1 font-mono tabular-nums">{results.cards.length} cards · {results.quiz.length} quiz · {results.formulae.length} formulas · {results.glossary.length} glossary</div>)}

      <div className="space-y-3">
        {results.cards.map(c=>(
          <div key={c.id} className="surface-card shadow-soft p-4">
            <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">{tagForTopic(c.topic)} · Card</div>
            <div className="mt-2 font-display font-medium text-slate-900 whitespace-pre-wrap">{c.q}</div>
            <div className="mt-1 text-[14px] text-slate-700 whitespace-pre-wrap leading-[1.65]">{c.a}</div>
            <div className="mt-2 text-[11px] text-slate-400">{c.src}</div>
          </div>
        ))}
        {results.quiz.map(c=>(
          <div key={c.id} className="surface-card shadow-soft p-4">
            <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">{tagForTopic(c.topic)} · Quiz</div>
            <div className="mt-2 font-display font-medium text-slate-900 whitespace-pre-wrap">{c.q}</div>
            {c.explain && <div className="mt-1 text-[14px] text-slate-700 whitespace-pre-wrap leading-[1.65]">{c.explain}</div>}
            {c.sample && <div className="mt-1 text-[14px] text-slate-700 whitespace-pre-wrap leading-[1.65]">{c.sample}</div>}
            <div className="mt-2 text-[11px] text-slate-400">{c.src}</div>
          </div>
        ))}
        {results.glossary.map(g=>(
          <div key={g.id} className="surface-card shadow-soft p-4">
            <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">{g.cat} · Glossary</div>
            <div className="mt-2 font-display font-medium text-slate-900">{g.term}</div>
            <div className="mt-1 text-[14px] text-slate-700 leading-[1.65]">{g.def}</div>
            <div className="mt-2 text-[11px] text-slate-400">{g.src}</div>
          </div>
        ))}
        {results.formulae.map(f=>(
          <div key={f.id} className="surface-card shadow-soft p-4">
            <div className="text-[11px] uppercase tracking-[0.08em] text-slate-400 font-mono">Formula</div>
            <div className="mt-2 font-display font-medium text-slate-900">{f.title}</div>
            <div className="mt-1 font-mono text-[14px] text-slate-800">{f.formula}</div>
            {f.note && <div className="mt-1 text-[14px] text-slate-700 leading-[1.65]">{f.note}</div>}
            <div className="mt-2 text-[11px] text-slate-400">{f.src}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ======================== APP ROOT ======================== */
function App(){
  if (!FIREBASE_READY) return <SetupScreen/>;
  if (firebaseError) return (
    <div className="min-h-screen flex items-center justify-center px-4">
      <div className="surface-card shadow-soft p-6 max-w-md fade-in">
        <h1 className="font-display text-lg font-semibold text-rose-700">Firebase init error</h1>
        <p className="text-[14px] text-slate-700 mt-1">{firebaseError}</p>
        <p className="text-[12px] text-slate-500 mt-2">Check that <span className="font-mono">FIREBASE_CONFIG</span> at the top of the HTML file is filled in correctly.</p>
      </div>
    </div>
  );

  const [displayName, setDisplayName] = useState(() => {
    try { return localStorage.getItem(SESSION_KEY) || null; } catch (e) { return null; }
  });

  const [tab, setTab] = useState("dash");
  const [leitner, setLeitner] = useState({});
  const [topicFilter, setTopicFilter] = useState("all");
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [streakPulse, setStreakPulse] = useState(false);
  const [confettiFiredFor, setConfettiFiredFor] = useState([]);
  const [loadingUser, setLoadingUser] = useState(false);

  const userDocRef = useMemo(()=>{
    if (!displayName) return null;
    return db.collection("users").doc(normalizeName(displayName));
  }, [displayName]);

  useEffect(()=>{
    if (!userDocRef) { setLeitner({}); setStreak(0); setBestStreak(0); return; }
    setLoadingUser(true);
    userDocRef.get().then(snap => {
      if (snap.exists) {
        const d = snap.data();
        setLeitner(d.leitner || {});
        setStreak(d.streak || 0);
        setBestStreak(d.bestStreak || 0);
      } else {
        userDocRef.set({
          displayName,
          leitner: {},
          streak: 0,
          bestStreak: 0,
          totalGotIt: 0,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastActive: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(e => console.warn("create user failed", e));
      }
      setLoadingUser(false);
    }).catch(e => {
      console.warn("fetch user failed", e);
      setLoadingUser(false);
    });
  }, [userDocRef]);

  const lastWriteRef = useRef(0);
  useEffect(()=>{
    if (!userDocRef) return;
    if (loadingUser) return;
    const t = setTimeout(() => {
      const totalGotIt = Object.values(leitner).filter(v => v === "sitzt").length;
      userDocRef.set({
        displayName,
        leitner,
        streak,
        bestStreak,
        totalGotIt,
        lastActive: firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge: true }).catch(e => console.warn("sync failed", e));
      lastWriteRef.current = Date.now();
    }, 900);
    return () => clearTimeout(t);
  }, [leitner, streak, bestStreak, userDocRef, loadingUser, displayName]);

  const handleLogin = async (name) => {
    try { localStorage.setItem(SESSION_KEY, name); } catch (e) {}
    setDisplayName(name);
  };
  const handleLogout = () => {
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    setDisplayName(null);
    setLeitner({}); setStreak(0); setBestStreak(0);
    setTab("dash");
  };

  const onPickTopic = (id) => { setTopicFilter(id); setTab("cards"); };
  const onWeakSpots = () => { setTopicFilter("weak"); setTab("cards"); };

  const onMark = useCallback((status, cardId, queue) => {
    if (status === "sitzt") {
      setStreak(s => {
        const newStreak = s + 1;
        setBestStreak(bs => Math.max(bs, newStreak));
        return newStreak;
      });
      setStreakPulse(true);
      setTimeout(()=>setStreakPulse(false), 500);
    } else {
      setStreak(0);
    }

    const after = { ...leitner, [cardId]: status };
    const allSitzt = queue.every(c => (c.id === cardId ? status : after[c.id]) === "sitzt");
    if (allSitzt && queue.length > 0 && !confettiFiredFor.includes(topicFilter)) {
      try {
        confetti({ particleCount: 110, spread: 70, origin: { y: 0.6 }, colors: ["#059669", "#10B981", "#34D399", "#4F46E5", "#F97316"] });
        setTimeout(()=>confetti({ particleCount: 60, spread: 100, origin: { y: 0.5 } }), 250);
      } catch (e) {}
      setConfettiFiredFor(prev => [...prev, topicFilter]);
    }
  }, [leitner, topicFilter, confettiFiredFor]);

  if (!displayName) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <div className="min-h-screen">
      <TabBar
        active={tab}
        onChange={setTab}
        streak={streak}
        displayName={displayName}
        onLogout={handleLogout}
      />
      {tab==="dash"   && <Dashboard onPickTopic={onPickTopic} onWeakSpots={onWeakSpots} leitner={leitner} totalCards={CARDS.length} totalQuiz={QUIZ.length} streak={streak} displayName={displayName} />}
      {tab==="cards"  && <FlashcardMode leitner={leitner} setLeitner={setLeitner} topicFilter={topicFilter} setTopicFilter={setTopicFilter} onMark={onMark}/>}
      {tab==="quiz"   && <QuizMode />}
      {tab==="formel" && <FormulaSheet />}
      {tab==="gloss"  && <GlossarySheet />}
      {tab==="board"  && <Leaderboard currentName={displayName} />}
      {tab==="search" && <SearchMode />}
      <footer className="max-w-3xl mx-auto px-4 py-8 text-[11px] text-slate-400 text-center">
        © Study aid for private use. Content from HSLU MSc Sustainable Financing materials (Berchtold, Mattmann, Kraft/Kempf, Engesser; past exams 2024 & 2025). Multiplayer powered by Firebase.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
